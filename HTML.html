<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formation HTML - Davbot</title>

<style>
:root{
--blue:#6c5cff;
--cyan:#00d2ff;
--dark:#050a14;
--glass:rgba(255,255,255,0.05);
}

/* BODY */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background: radial-gradient(circle at top,#0b1c2c,#050a14);
color:white;
}

/* HEADER */
.header{
text-align:center;
padding:20px;
}

.header h2{
margin:0;
color:var(--cyan);
}

.header p{
opacity:0.6;
font-size:13px;
}

/* PROGRESSION */
.progressBox{
max-width:700px;
margin:auto;
padding:10px;
}

.progress{
height:10px;
background:#111;
border-radius:10px;
overflow:hidden;
}

.progressBar{
height:100%;
width:0%;
background:linear-gradient(90deg,var(--blue),var(--cyan));
}

/* LESSON */
.lesson{
max-width:700px;
margin:auto;
background:var(--glass);
padding:15px;
border-radius:12px;
margin-top:10px;
border:1px solid rgba(255,255,255,0.08);
}

.lesson h3{
color:var(--cyan);
}

/* TEXT */
.lesson p{
font-size:14px;
line-height:1.5;
}

/* NAVIGATION */
.nav{
display:flex;
gap:10px;
margin-top:10px;
}

.nav button{
flex:1;
}

/* INPUT */
textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#0b1c2c;
color:white;
outline:none;
}

/* BUTTON */
button{
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,var(--blue),var(--cyan));
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.02);
}

/* RESPONSE */
.response{
background:#111;
padding:10px;
margin-top:10px;
border-radius:10px;
font-size:13px;
}

/* LOCK */
.lock{
text-align:center;
margin-top:20px;
color:red;
}

/* FOOTER */
.footer{
text-align:center;
margin-top:20px;
opacity:0.6;
font-size:12px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<h2>🌐 Formation HTML</h2>
<p>Apprends à coder étape par étape 🚀</p>
</div>

<!-- PROGRESSION -->
<div class="progressBox">
<p id="dayText">Jour 1</p>
<div class="progress">
<div class="progressBar" id="progressBar"></div>
</div>
</div>

<!-- LEÇON -->
<div class="lesson" id="lessonBox">
Chargement...
</div>

<!-- NAVIGATION -->
<div class="lesson">
<div class="nav">
<button onclick="prevLesson()">⬅️ Précédent</button>
<button onclick="nextLesson()">➡️ Suivant</button>
</div>
</div>

<!-- IA QUESTION -->
<div class="lesson">
<h3>🤖 Poser une question</h3>

<textarea id="questionInput" placeholder="Pose ta question sur la leçon du jour..."></textarea>

<button onclick="askAI()">Envoyer</button>

<div id="aiResponse" class="response"></div>
</div>

<!-- MESSAGE LOCK -->
<div class="lock" id="lockBox"></div>

<!-- FOOTER -->
<div class="footer">
Davbot Formation © 2026
</div>

<!-- JS -->
<script type="module" src="HTML.js"></script>

</body>
  </html>
