<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formation HTML CSS JS</title>

<style>
:root{
--blue:#6c5cff;
--cyan:#00d2ff;
--dark:#050a14;
--glass:rgba(255,255,255,0.05);
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background: radial-gradient(circle at top,#0b1c2c,#050a14);
color:white;
}

/* HEADER */
.header{
text-align:center;
padding:20px;
}

.header h2{
color:var(--cyan);
}

/* CONTAINER */
.container{
padding:15px;
max-width:700px;
margin:auto;
}

/* CARD */
.card{
background:var(--glass);
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,var(--blue),var(--cyan));
font-weight:bold;
cursor:pointer;
}

/* INPUT */
textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
background:rgba(255,255,255,0.05);
color:white;
}

.day{
color:var(--cyan);
font-weight:bold;
}

.price{
color:var(--cyan);
font-weight:bold;
}

.locked{
background:gray;
cursor:not-allowed;
}
</style>
</head>

<body>

<div class="header">
<h2>🌐 Formation HTML CSS JS</h2>
<p>Durée: 2 mois 10 jours</p>
</div>

<div class="container">

<div class="card">
<div class="day" id="dayTitle">Jour 1</div>
<h3 id="lessonTitle"></h3>
<p id="lessonContent"></p>
</div>

<div class="card">
<h3>❓ Question au prof IA</h3>
<textarea id="question" placeholder="Pose ta question sur la leçon"></textarea>
<button onclick="ask()">Envoyer</button>
</div>

</div>

<script type="module" src="HTML.js"></script>

</body>
</html>
