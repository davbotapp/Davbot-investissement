<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Formation Dev - Davbot</title>

<style>
:root{
--blue:#6c5cff;
--cyan:#00d2ff;
--dark:#050a14;
--glass:rgba(255,255,255,0.05);
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background: radial-gradient(circle at top,#0b1c2c,#050a14);
color:white;
}

/* HEADER */
.header{
text-align:center;
padding:20px;
}

.header h1{
color:var(--cyan);
margin:0;
}

.header p{
opacity:0.6;
font-size:14px;
}

/* NAV */
.nav{
display:flex;
justify-content:center;
gap:10px;
margin:10px;
}

.nav button{
padding:10px 15px;
border:none;
border-radius:8px;
background:var(--glass);
color:white;
cursor:pointer;
}

.nav button.active{
background:linear-gradient(90deg,var(--blue),var(--cyan));
}

/* BOX */
.box{
max-width:700px;
margin:20px auto;
padding:20px;
background:var(--glass);
border-radius:12px;
}

/* CODE */
pre{
background:black;
padding:10px;
border-radius:8px;
overflow:auto;
}

/* INPUT */
input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.08);
color:white;
}

/* BTN */
.mainBtn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,var(--blue),var(--cyan));
font-weight:bold;
cursor:pointer;
}

/* ANSWER */
.answer{
margin-top:10px;
background:rgba(0,0,0,0.3);
padding:10px;
border-radius:8px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<h1>🎓 Formation Développeur</h1>
<p>HTML • CSS • JavaScript (70 jours)</p>
</div>

<!-- NAVIGATION -->
<div class="nav">
<button onclick="loadSection('html')" class="active">HTML</button>
<button onclick="loadSection('css')">CSS</button>
<button onclick="loadSection('js')">JS</button>
</div>

<!-- CONTENU -->
<div class="box" id="lessonBox">
Chargement...
</div>

<!-- IA -->
<div class="box">
<h3>🤖 Pose ta question</h3>

<input id="question" placeholder="Pose une question sur la leçon">

<button class="mainBtn" onclick="ask()">Demander</button>

<div id="answer" class="answer"></div>
</div>

<!-- SCRIPTS -->
<script src="HTML.js"></script>
<script src="CSS.js"></script>
<script src="JS.js"></script>

<script>

// SECTION ACTUELLE
let currentSection = "html";

// CHANGER SECTION
function loadSection(section){

currentSection = section;

// style bouton
document.querySelectorAll(".nav button")
.forEach(b=>b.classList.remove("active"));

event.target.classList.add("active");

// 🔥 CHARGEMENT
if(section === "html"){
showLesson();
}
else if(section === "css"){
showCSS();
}
else{
showJS();
}

}

</script>

</body>
</html>
