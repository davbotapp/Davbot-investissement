<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tâche 3 – Slot Chance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:linear-gradient(#050816,#000);
  font-family:Arial,sans-serif;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#0b153f;
  padding:20px;
  border-radius:14px;
  width:90%;
  max-width:380px;
  text-align:center;
}

.slots{
  display:flex;
  justify-content:space-between;
  margin:25px 0;
}

.slot{
  width:90px;
  height:90px;
  background:#020617;
  border-radius:12px;
  font-size:2rem;
  display:flex;
  justify-content:center;
  align-items:center;
}

button{
  background:#ffd166;
  color:#000;
  border:none;
  padding:12px 20px;
  font-size:1rem;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.result{margin-top:15px;font-size:1.1rem;}
.success{color:#00ffb3}
.fail{color:#ff6b6b}
.note{font-size:.8rem;opacity:.8;margin-top:10px;}
</style>
</head>

<body>

<div class="container">
  <h1>🎰 Slot Chance</h1>

  <div class="slots">
    <div class="slot" id="s1">❔</div>
    <div class="slot" id="s2">❔</div>
    <div class="slot" id="s3">❔</div>
  </div>

  <button id="play">Jouer</button>

  <div class="result" id="result"></div>

  <div class="note">
  Perte 55% • Petit 25% • Moyen 16% • Jackpot 4%
  </div>
</div>

<script type="module" src="3.js"></script>

</body>
</html>
