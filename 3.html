<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Devine P7</title>

<style>
body{background:#050a14;color:white;text-align:center;}
button{padding:10px;margin:5px;background:#00d2ff;}
</style>
</head>

<body>

<h2>🔢 Devine P7</h2>
<div id="nums"></div>
<p id="res"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({apiKey:"AIza...",databaseURL:"https://starlink-investit-default-rtdb.firebaseio.com"});
const db = getDatabase(app);
const user = localStorage.getItem("userPhone");

let secret = Math.floor(Math.random()*5);

for(let i=0;i<5;i++){
let b=document.createElement("button");
b.innerText=i;

b.onclick=async()=>{
const snap = await get(ref(db,"users/"+user));
const d = snap.val();

if(!d.token) return alert("Jeton P7 requis");

let gain = (i===secret)?30000:0;

if((d.todayGain||0)>=30000) gain=0;

await update(ref(db,"users/"+user),{
points:(d.points||0)+gain,
todayGain:(d.todayGain||0)+gain,
totalPlayed:(d.totalPlayed||0)+1
});

document.getElementById("res").innerText =
gain?"🎉 Jackpot":"❌ Mauvais";
};

document.getElementById("nums").appendChild(b);
}
</script>

</body>
</html>
