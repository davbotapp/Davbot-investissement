<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transfert - DAVBOT</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; }

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:var(--dark) url('IMG_0870.jpeg') no-repeat center center fixed;
    background-size:cover;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
}

.card{
    position:relative;
    z-index:2;
    width:90%;
    max-width:400px;
    background:rgba(0,0,0,0.9);
    padding:25px;
    border-radius:20px;
    border:1px solid var(--blue);
    backdrop-filter:blur(15px);
}

h2{
    text-align:center;
    color:var(--blue);
}

.solde{
    background:rgba(0,210,255,0.1);
    padding:10px;
    border-radius:10px;
    text-align:center;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    background:#111;
    color:white;
}

button{
    width:100%;
    padding:15px;
    background:var(--blue);
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:active{
    transform:scale(0.97);
}

.status{
    margin-top:10px;
    font-size:13px;
    text-align:center;
    color:#ffeb3b;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">
    <h2>🔄 Transfert</h2>

    <div class="solde">
        Solde : <b id="solde">0</b> FC
    </div>

    <input type="tel" id="to" placeholder="Numéro destinataire">
<input type="number" id="amount" placeholder="Montant">

<button id="btn">Envoyer</button>

<div id="status"></div>

   
</div>

<script type="module" src="transf.js"></script>

</body>
</html>
