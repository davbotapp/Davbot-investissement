<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nos Services</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; }

body {
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:var(--dark);
    color:white;
}

.header {
    text-align:center;
    padding:20px;
    border-bottom:1px solid var(--blue);
}

.container {
    padding:20px;
}

.card {
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(0,210,255,0.2);
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
}

.title { color:var(--blue); font-weight:bold; }
.desc { font-size:13px; }

.actions {
    margin-top:10px;
    display:flex;
    justify-content:space-between;
}

.like-btn {
    border:1px solid var(--blue);
    background:transparent;
    color:white;
    padding:5px 10px;
    border-radius:10px;
}

.order-btn {
    background:var(--blue);
    border:none;
    padding:8px 12px;
    border-radius:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
    <h2>🚀 Nos Services</h2>
</div>

<div class="container" id="services"></div>

<script>
// SERVICES
const services = [
    { nom:"Application", desc:"Création application mobile" },
    { nom:"Site Web Pro", desc:"Création site professionnel" },
    { nom:"Intelligence Artificielle", desc:"Chatbot et IA" },
    { nom:"Réseaux Sociaux", desc:"Boost et gestion comptes" },
    { nom:"Hébergement", desc:"Serveur rapide et sécurisé" }
];

// AFFICHAGE
const container = document.getElementById("services");

services.forEach(s=>{
    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
        <div class="title">${s.nom}</div>
        <div class="desc">${s.desc}</div>

        <div class="actions">
            <button class="like-btn" onclick="like(this)">❤️ <span>0</span></button>
            <button class="order-btn" onclick="commander('${s.nom}')">Commander</button>
        </div>
    `;

    container.appendChild(div);
});

// LIKE
function like(btn){
    let span = btn.querySelector("span");
    span.innerText = parseInt(span.innerText)+1;
}

// COMMANDER
function commander(service){
    localStorage.setItem("serviceCommande", service);
    window.location.href = "commande.html";
}
</script>

</body>
</html>
