<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA Bots - Davbot</title>

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
    --blue:#00d2ff;
    --dark:#050a14;
    --glass:rgba(255,255,255,0.05);
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: radial-gradient(circle at top, #0b1c2c, #050a14);
    color:white;
}

/* LAYOUT */
.overlay{
    padding:15px;
    min-height:100vh;
}

.header{
    text-align:center;
    margin-bottom:15px;
}

.header h2{
    color:var(--blue);
    font-size:22px;
}

.header p{
    font-size:13px;
    opacity:0.7;
}

/* CARD */
.card{
    max-width:600px;
    margin:auto;
    background:var(--glass);
    padding:15px;
    border-radius:15px;
    backdrop-filter:blur(10px);
    border:1px solid rgba(0,210,255,0.2);
    animation:fadeUp 0.5s ease;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* TYPES */
.types{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
}

.type-item{
    padding:10px;
    border-radius:10px;
    background:rgba(255,255,255,0.05);
    text-align:center;
    cursor:pointer;
    font-size:13px;
    transition:0.3s;
}

.type-item:hover{
    transform:scale(1.05);
}

.type-item.active{
    background:var(--blue);
    color:black;
    font-weight:bold;
}

/* FORM */
input, textarea{
    width:100%;
    margin-top:8px;
    padding:8px 10px;
    border-radius:8px;
    border:none;
    background:rgba(255,255,255,0.06);
    color:white;
    font-size:13px;
}

textarea{
    height:70px;
    resize:none;
}

/* PRICE */
.price{
    text-align:center;
    margin-top:10px;
    font-size:18px;
    color:var(--blue);
}

/* BUTTON */
button{
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00d2ff,#3a7bd5);
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* EMPTY TEXT */
.empty{
    text-align:center;
    opacity:0.5;
    margin-top:10px;
    font-size:13px;
}
</style>
</head>

<body>

<div class="overlay">

<div class="header">
<h2><i class="fa-solid fa-robot"></i> IA Bots</h2>
<p>Automatise ton business avec l'intelligence artificielle 🤖</p>
    </p>
</div>

<div class="card">

<!-- TYPES -->
<div class="types" id="types">

<div class="type-item" data-type="fb_page" data-price="8000">
<i class="fa-brands fa-facebook"></i><br> Page FB
</div>

<div class="type-item" data-type="fb_auto" data-price="4000">
<i class="fa-solid fa-bolt"></i><br>

<div class="type-item" data-type="wa" data-price="7000">
<i class="fa-brands fa-whatsapp"></i><br> WhatsApp
</div>

<div class="type-item" data-type="web" data-price="12000">
<i class="fa-solid fa-globe"></i><br> Web Bot
</div>

</div>

<!-- FORM -->
<div id="formZone">
<p class="empty">Choisis un type de bot</p>
</div>

<!-- PRICE -->
<div class="price" id="price">0 FC</div>

<!-- BTN -->
<button onclick="valider()">
<i class="fa-solid fa-paper-plane"></i> Commander
</button>

</div>

</div>

<script type="module" src="ai.js"></script>

</body>
</html>
