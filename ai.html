<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA Bots - Davbot</title>

<style>
:root{
    --blue:#00d2ff;
    --dark:#050a14;
    --glass:rgba(255,255,255,0.05);
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:var(--dark);
    color:white;
}

/* OVERLAY */
.overlay{
    padding:20px;
}

/* HEADER */
h2{
    text-align:center;
    color:var(--blue);
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 5px var(--blue);}
    to{ text-shadow:0 0 20px var(--blue);}
}

/* CARD */
.card{
    background:var(--glass);
    padding:20px;
    border-radius:20px;
    margin-top:20px;
    backdrop-filter: blur(10px);
    border:1px solid rgba(0,210,255,0.2);
}

/* TYPES */
.types{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:15px;
}

.type-item{
    padding:12px;
    text-align:center;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    cursor:pointer;
    transition:0.3s;
}

.type-item:hover{
    transform:scale(1.05);
}

.type-item.active{
    background:var(--blue);
    color:black;
    font-weight:bold;
}

/* FORM */
input, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    color:white;
}

/* PRICE */
.price{
    text-align:center;
    color:var(--blue);
    font-size:20px;
    margin:10px 0;
    transition:0.2s;
}

/* BUTTON */
button{
    width:100%;
    padding:15px;
    background:var(--blue);
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="overlay">

<h2>🤖 Intelligence Artificielle</h2>

<div class="card">

<!-- TYPES -->
<div class="types" id="types">
<div class="type-item" data-type="fb_page" data-price="8000">📘 Bot Page Facebook</div>

<div class="type-item" data-type="fb_auto" data-price="4000">🤖 FB AutoBots</div>
<div class="type-item" data-type="wa" data-price="7000">💬 WhatsApp Bot</div>
<div class="type-item" data-type="web" data-price="12000">🌐 Web Bot</div>
</div>

<!-- FORMULAIRE DYNAMIQUE -->
<div id="formZone">
<p style="opacity:0.6;text-align:center;">Choisis un type de bot</p>
</div>

<!-- PRIX -->
<div class="price" id="price">💰 0 FC</div>

<!-- BTN -->
<button onclick="valider()">🚀 Commander</button>

</div>

</div>

<script type="module" src="ai.js"></script>

</body>
</html>
