<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retrait - Starlink</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; }

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:var(--dark) url('IMG_0870.jpeg') no-repeat center center fixed;
    background-size:cover;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.overlay{
    background:rgba(5,10,20,0.9);
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:90%;
    max-width:400px;
    background:rgba(0,0,0,0.85);
    padding:25px;
    border-radius:20px;
    border:1px solid var(--blue);
    backdrop-filter:blur(10px);
}

h2{
    text-align:center;
    color:var(--blue);
}

.solde{
    background:rgba(0,210,255,0.1);
    padding:12px;
    border-radius:10px;
    text-align:center;
    margin-bottom:15px;
    font-size:18px;
}

input, select{
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    background:rgba(255,255,255,0.08);
    color:white;
}

button{
    width:100%;
    padding:15px;
    background:#f44336;
    border:none;
    border-radius:10px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.status{
    margin-top:10px;
    text-align:center;
    font-size:13px;
    color:#ffeb3b;
}

.back{
    text-align:center;
    margin-top:10px;
    font-size:13px;
}
.back a{
    color:white;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="overlay">
<div class="card">

    <h2>💸 Retrait</h2>

    <div class="solde">
        Solde disponible : <b id="solde">0</b> FC
    </div>

    <input type="number" id="amount" placeholder="Montant (min 1500)">
    
    <select id="method">
        <option value="M-Pesa">M-Pesa</option>
        <option value="Airtel Money">Airtel Money</option>
        <option value="Orange Money">Orange Money</option>
    </select>

    <input type="tel" id="numero" placeholder="Numéro de réception">

    <button id="btn">Envoyer la demande</button>

    <div class="status" id="status"></div>

    <div class="back">
        <a href="profil.html">← Retour</a>
    </div>

</div>
</div>

<script type="module" src="retrait.js"></script>

</body>
</html>
