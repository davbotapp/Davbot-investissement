<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retrait - Davbot</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; }

body {
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:var(--dark);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card {
    width:90%;
    max-width:400px;
    background:rgba(0,0,0,0.9);
    padding:25px;
    border-radius:20px;
    border:1px solid var(--blue);
}

h2 { text-align:center; color:var(--blue); }

.solde {
    background:rgba(0,210,255,0.1);
    padding:10px;
    border-radius:10px;
    text-align:center;
    margin-bottom:15px;
}

input, select {
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    background:#111;
    color:white;
}

button {
    width:100%;
    padding:15px;
    background:#f44336;
    border:none;
    border-radius:10px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.status {
    margin-top:10px;
    font-size:13px;
    text-align:center;
    color:#ffeb3b;
}
</style>
</head>

<body>

<div class="card">
    <h2>💸 Retrait</h2>

    <div class="solde">
        Solde : <b id="solde">0</b> FC
    </div>

    <input type="number" id="amount" placeholder="Montant (min 5000)">
    
    <select id="method">
        <option value="M-Pesa">M-Pesa</option>
        <option value="Airtel Money">Airtel Money</option>
        <option value="Orange Money">Orange Money</option>
    </select>

    <input type="tel" id="numero" placeholder="Numéro de réception">

    <button id="btn">Envoyer la demande</button>

    <div class="status" id="status"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyA24pBo8mBWiZssPtep--MMBdB7c8_Lu4U",
    authDomain: "starlink-investit.firebaseapp.com",
    databaseURL: "https://starlink-investit-default-rtdb.firebaseio.com",
    projectId: "starlink-investit",
    storageBucket: "starlink-investit.appspot.com",
    messagingSenderId: "807081599583",
    appId: "1:807081599583:web:e00ec3959bc4acdae031ea"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const userPhone = localStorage.getItem("userPhone");
if(!userPhone) window.location.href = "login.html";

const userRef = ref(db, "users/" + userPhone);

// 🔄 afficher solde en temps réel
onValue(userRef, snap=>{
    if(snap.exists()){
        const data = snap.val();
        const solde = (data.balance || 0);
        document.getElementById("solde").innerText = solde.toLocaleString();
    }
});

// 🚀 ENVOI DEMANDE
document.getElementById("btn").onclick = async () => {

    const amount = parseInt(document.getElementById("amount").value);
    const numero = document.getElementById("numero").value.trim();
    const method = document.getElementById("method").value;
    const status = document.getElementById("status");

    try {

        const snap = await get(userRef);
        if(!snap.exists()) return;

        const data = snap.val();
        const solde = data.balance || 0;

        if(!amount || amount < 1500){
            status.innerText = "❌ Minimum 1500 FC";
            return;
        }

        if(amount > solde){
            status.innerText = "❌ Solde insuffisant";
            return;
        }

        if(numero.length < 9){
            status.innerText = "❌ Numéro invalide";
            return;
        }

        status.innerText = "⏳ Envoi en cours...";

        // 🔥 ENVOI DEMANDE (PAS DE RETRAIT ICI)
        await push(ref(db, "demandes_retraits"), {
            telephone: userPhone,
            montant: amount,
            methode: method,
            numero: numero,
            statut: "En attente",
            date: Date.now()
        });

        status.style.color = "lightgreen";
        status.innerText = "✅ Demande envoyée à l'admin";

        setTimeout(()=>{
            window.location.href = "profil.html";
        },1500);

    } catch(e){
        status.innerText = "❌ Erreur";
        console.error(e);
    }
};
</script>

</body>
</html>
