<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil - Davbot</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
--blue:#00d2ff;
--dark:#050a14;
--glass:rgba(255,255,255,0.06);
}

body{
margin:0;
font-family:'Segoe UI', sans-serif;
background:var(--dark) url('IMG_0870.jpeg') no-repeat center center fixed;
background-size:cover;
color:white;
}

.overlay{
background:linear-gradient(to bottom, rgba(5,10,20,0.95), rgba(5,10,20,0.85));
min-height:100vh;
padding-bottom:90px;
}

/* 🔔 NOTIF */
.notif{
position:fixed;
top:15px;
right:15px;
font-size:22px;
z-index:999;
cursor:pointer;
}
.notif span{
position:absolute;
top:-5px;
right:-5px;
background:red;
font-size:10px;
padding:3px 6px;
border-radius:50%;
}

/* HEADER */
.header{
text-align:center;
padding:30px 20px;
}

.avatar{
width:95px;
height:95px;
border-radius:50%;
object-fit:cover;
border:2px solid var(--blue);
box-shadow:0 0 20px var(--blue);
}

.card{
background:var(--glass);
margin:15px;
padding:18px;
border-radius:18px;
border:1px solid rgba(0,210,255,0.15);
backdrop-filter:blur(10px);
}

/* MENU */
.menu a{
display:flex;
align-items:center;
gap:10px;
padding:14px;
margin:10px;
background:var(--glass);
border-radius:12px;
text-decoration:none;
color:white;
}

/* BUTTON */
.sendBtn{
width:100%;
padding:12px;
background:var(--blue);
border:none;
border-radius:12px;
color:black;
font-weight:bold;
cursor:pointer;
}

/* CHAT ADMIN */
#adminChat{
position:fixed;
bottom:200px;
right:15px;
width:300px;
background:#0d1625;
border-radius:15px;
display:none;
flex-direction:column;
z-index:999;
overflow:hidden;
}

.admin-header{
background:var(--blue);
color:black;
padding:10px;
font-weight:bold;
}

.admin-messages{
height:200px;
overflow:auto;
padding:10px;
}

.admin-input{
display:flex;
}

.admin-input input{
flex:1;
padding:10px;
border:none;
}

.admin-input button{
background:var(--blue);
border:none;
}

/* FLOAT BOT */
.bot-float{
position:fixed;
bottom:140px;
right:15px;
width:55px;
height:55px;
background:var(--blue);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
cursor:pointer;
z-index:999;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:70px;
right:15px;
width:55px;
height:55px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
color:white;
text-decoration:none;
z-index:999;
}

/* NAVBAR */
.navbar{
position:fixed;
bottom:0;
width:100%;
background:rgba(5,10,20,0.95);
display:flex;
justify-content:space-around;
padding:12px;
}

.navbar a{
color:white;
text-decoration:none;
font-size:12px;
opacity:0.6;
text-align:center;
}

.navbar a.active{
opacity:1;
color:var(--blue);
}

</style>
</head>

<body>

<!-- 🔔 NOTIF ICON -->
<div class="notif" onclick="toggleNotif()">
<i class="fa-solid fa-bell"></i>
<span id="notifCount">0</span>
</div>

<div class="overlay">

<!-- HEADER -->
<div class="header">
<img id="avatar" class="avatar">
<h3 id="name">Utilisateur</h3>
<p id="phone">+243...</p>
<div id="badgeBox"></div>
</div>

<!-- STATS -->
<div class="card">
💰 Solde : <b id="solde">0</b> FC<br>
📈 Revenus : <b id="revenus">0</b> FC<br>
⭐ Points : <b id="points">0</b>
</div>

<!-- MONET -->
<div class="card">
<h3>💰 Monétisation</h3>
<button id="monetBtn" class="sendBtn">Activer</button>
<small id="monetInfo"></small>
</div>

<!-- MENU -->
<div class="menu">
<a href="recharge.html"><i class="fa-solid fa-arrow-down"></i> Recharger</a>
<a href="dashboard.html"><i class="fa-solid fa-chart-simple"></i> Dashboard</a>
<a href="equipe.html"><i class="fa-solid fa-users"></i> Équipe</a>
</div>

<!-- 💬 MESSAGES ADMIN (profil.js -> inbox) -->
<div class="card">
<h3>📩 Messages Admin</h3>
<div id="inbox"></div>

<textarea id="msgInput" placeholder="Écrire..."></textarea>
<button id="sendBtn" class="sendBtn">Envoyer</button>
</div>

<!-- 💬 CHAT ADMIN FLOAT -->
<div id="adminChat">
<div class="admin-header">Support Admin</div>
<div id="adminMsgs" class="admin-messages"></div>
<div class="admin-input">
<input id="adminInput" placeholder="Message...">
<button onclick="sendAdmin()">➤</button>
</div>
</div>

<!-- LOGOUT -->
<a href="#" id="logout" class="sendBtn">Déconnexion</a>

</div>

<!-- 🤖 FLOAT BOT -->
<div class="bot-float" onclick="toggleBot()">🤖</div>

<!-- 📱 WHATSAPP -->
<a href="https://wa.me/243982697752" class="whatsapp">
<i class="fa-brands fa-whatsapp"></i>
</a>

<!-- NAVBAR -->
<div class="navbar">
<a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i><br>Dash</a>
<a href="service.html"><i class="fa-solid fa-store"></i><br>Shop</a>
<a href="profil.html" class="active"><i class="fa-solid fa-user"></i><br>Profil</a>
</div>

<script type="module" src="profil.js"></script>

<script>
function toggleNotif(){
alert("Notifications ouvertes");
}

function toggleBot(){
document.getElementById("adminChat").style.display="flex";
}

function sendAdmin(){
let input=document.getElementById("adminInput");
let box=document.getElementById("adminMsgs");

if(!input.value) return;

box.innerHTML+=`<div style="text-align:right">${input.value}</div>`;
input.value="";
}
</script>

</body>
</html>
