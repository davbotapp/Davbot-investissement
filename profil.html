<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil - Davbot</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
--blue:#00d2ff;
--dark:#050a14;
--glass: rgba(255,255,255,0.06);
}

body{
margin:0;
font-family:'Segoe UI', sans-serif;
background:var(--dark) url('IMG_0870.jpeg') no-repeat center center fixed;
background-size:cover;
color:white;
}

.overlay{
background:linear-gradient(to bottom, rgba(5,10,20,0.95), rgba(5,10,20,0.85));
min-height:100vh;
padding-bottom:100px;
}

/* 🔔 NOTIF */
.notif{
position:fixed;
top:15px;
right:15px;
font-size:22px;
z-index:999;
cursor:pointer;
}

.notif span{
position:absolute;
top:-6px;
right:-6px;
background:red;
font-size:10px;
padding:3px 6px;
border-radius:50%;
}

/* 📩 PANEL MESSAGES */
.notif-box{
position:fixed;
top:60px;
right:15px;
width:300px;
max-height:400px;
overflow:auto;
background:#0d1625;
border-radius:12px;
display:none;
z-index:999;
padding:10px;
}

/* 🤖 BOT */
.bot-float{
position:fixed;
bottom:140px;
right:15px;
width:55px;
height:55px;
background:var(--blue);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
z-index:999;
cursor:pointer;
}

/* 📱 WHATSAPP */
.whatsapp{
position:fixed;
bottom:70px;
right:15px;
width:55px;
height:55px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:25px;
color:white;
text-decoration:none;
z-index:999;
}

/* HEADER */
.header{text-align:center;padding:30px 20px;}

.avatar{
width:95px;
height:95px;
border-radius:50%;
object-fit:cover;
border:2px solid var(--blue);
box-shadow:0 0 20px var(--blue);
}

.card{
background:var(--glass);
margin:15px;
padding:18px;
border-radius:18px;
}

.menu a{
display:flex;
gap:10px;
padding:14px;
margin:10px;
background:var(--glass);
border-radius:12px;
color:white;
text-decoration:none;
}

.sendBtn{
width:100%;
padding:12px;
background:var(--blue);
border:none;
border-radius:12px;
color:black;
font-weight:bold;
}

/* NAVBAR */
.navbar{
position:fixed;
bottom:0;
width:100%;
background:rgba(5,10,20,0.95);
display:flex;
justify-content:space-around;
padding:12px;
}

.navbar a{
color:white;
text-decoration:none;
font-size:12px;
opacity:0.6;
text-align:center;
}

.navbar a.active{
opacity:1;
color:var(--blue);
}

</style>
</head>

<body>

<!-- 🔔 CLOCHE -->
<div class="notif" onclick="toggleNotif()">
<i class="fa-solid fa-bell"></i>
<span id="notifCount">0</span>
</div>

<!-- 📩 BOITE MESSAGES -->
<div id="notifBox" class="notif-box"></div>

<div class="overlay">

<div class="header">
<img id="avatar" class="avatar">
<h3 id="name">Utilisateur</h3>
<p id="phone">+243...</p>
<div id="badgeBox"></div>
</div>

<div class="card">
💰 Solde : <b id="solde">0</b> FC<br>
📈 Revenus : <b id="revenus">0</b> FC<br>
⭐ Points : <b id="points">0</b>
</div>

<div class="card">
<h3>💰 Monétisation</h3>
<button id="monetBtn" class="sendBtn">Activer</button>
<small id="monetInfo"></small>
</div>

<div class="menu">
<a href="recharge.html"><i class="fa-solid fa-arrow-down"></i> Recharger</a>
<a href="dashboard.html"><i class="fa-solid fa-chart-simple"></i> Dashboard</a>
<a href="equipe.html"><i class="fa-solid fa-users"></i> Équipe</a>
</div>

<!-- MESSAGE ENVOI -->
<div class="card">
<textarea id="msgInput" placeholder="Écrire..."></textarea>
<button id="sendBtn" class="sendBtn">Envoyer</button>
</div>

<a href="#" id="logout" class="sendBtn">Déconnexion</a>

</div>

<!-- FLOAT -->
<div class="bot-float">🤖</div>

<a href="https://wa.me/243982697752" class="whatsapp">
<i class="fa-brands fa-whatsapp"></i>
</a>

<!-- NAVBAR -->
<div class="navbar">
<a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i><br>Dash</a>
<a href="service.html"><i class="fa-solid fa-store"></i><br>Shop</a>
<a href="profil.html" class="active"><i class="fa-solid fa-user"></i><br>Profil</a>
</div>
  

<script type="module" src="profil.js"></script>

<!-- 🔥 SCRIPT NOTIFICATION -->
<script type="module">
import { getDatabase, ref, onValue, update, get }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const db = getDatabase();
const userPhone = localStorage.getItem("userPhone");

const notifCount = document.getElementById("notifCount");
const notifBox = document.getElementById("notifBox");

// 🔄 TEMPS RÉEL
onValue(ref(db,"messages/"+userPhone), snap=>{

notifBox.innerHTML = "";
let count = 0;

if(!snap.exists()){
notifCount.innerText = "0";
return;
}

Object.entries(snap.val()).reverse().forEach(([id,msg])=>{

if(msg.read === false) count++;

notifBox.innerHTML += `
<div style="
background:#111;
padding:10px;
margin-top:8px;
border-radius:10px;
border-left:3px solid ${msg.read ? "#444" : "#00d2ff"};
">
${msg.text || ""}
<br><small>${new Date(msg.date).toLocaleString()}</small>
</div>
`;

});

notifCount.innerText = count;

});

// 🔔 CLICK
window.toggleNotif = async ()=>{

notifBox.style.display =
notifBox.style.display === "block" ? "none" : "block";

// 🔥 marquer comme lus
const snap = await get(ref(db,"messages/"+userPhone));
if(!snap.exists()) return;

const updates = {};

Object.entries(snap.val()).forEach(([id,msg])=>{
if(msg.read === false){
updates["messages/"+userPhone+"/"+id+"/read"] = true;
}
});

update(ref(db), updates);

};

</script>

</body>
</html>
