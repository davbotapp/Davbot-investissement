<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil - Davbot</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; }

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:var(--dark) url('IMG_0870.jpeg') no-repeat center center fixed;
    background-size:cover;
    color:white;
}

.overlay{
    background:rgba(5,10,20,0.9);
    min-height:100vh;
}

/* HEADER */
.header{
    text-align:center;
    padding:30px;
    border-bottom:1px solid var(--blue);
}

/* PHOTO */
.avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    margin:auto;
    display:block;
    border:2px solid var(--blue);
    box-shadow:0 0 20px var(--blue);
}

/* CARD */
.card{
    background:rgba(255,255,255,0.05);
    margin:15px;
    padding:15px;
    border-radius:15px;
    border:1px solid rgba(0,210,255,0.2);
}

/* MENU */
.menu a{
    display:block;
    padding:14px;
    margin:10px 15px;
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    text-decoration:none;
    color:white;
}

/* MONÉTISATION */
.monet{
    text-align:center;
}

.monet button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    margin-top:10px;
    cursor:pointer;
}

.locked{
    background:#555;
}

.active{
    background:#00ff88;
    color:black;
}

.unlock{
    background:#ff9800;
}

/* LOGOUT */
.logout-btn{
    display:block;
    padding:14px;
    margin:10px 15px;
    background:#f44336;
    border-radius:12px;
    text-align:center;
    color:white;
    font-weight:bold;
}

/* NAVBAR */
.navbar{
    position:fixed;
    bottom:0;
    width:100%;
    background:rgba(5,10,20,0.95);
    display:flex;
    justify-content:space-around;
    padding:12px;
    border-top:1px solid var(--blue);
}

.navbar a{
    color:white;
    text-decoration:none;
    font-size:12px;
    opacity:0.6;
}

.navbar a.active{
    opacity:1;
    color:var(--blue);
}
</style>
</head>

<body>

<div class="overlay">

<!-- HEADER -->
<div class="header">
    <img id="avatar" class="avatar" src="">
    <h3 id="name">Nom</h3>
    <p id="phone">Numéro</p>
</div>

<!-- 💰 STATS -->
<div class="card">
    💰 Solde : <b id="solde">0</b> FC<br><br>
    💸 Revenus : <b id="revenus">0</b> FC<br><br>
    ⭐ Points : <b id="points">0</b>
</div>

<!-- 💰 MONÉTISATION -->
<div class="card monet">
    <h3>💰 Monétisation</h3>

    <button id="monetBtn" class="locked">🔒 Bloqué (30 jours)</button>
    <small id="monetInfo"></small>
</div>

<!-- MENU -->
<div class="menu">
    <a href="recharge.html">📥 Recharger</a>
    <a href="retrait.html">📤 Retirer</a>
    <a href="transf.html">🔂 Transfert</a>
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="equipe.html">👥 Équipe</a>
</div>

<!-- 📩 INBOX -->
<div class="card">
    <h3>📩 Messages Admin</h3>

    <div id="inbox"></div>

    <!-- ✍️ RÉPONDRE -->
    <div style="margin-top:15px;">
        <textarea id="msgInput" placeholder="Écrire à l'admin..." 
        style="width:100%;padding:10px;border-radius:10px;border:none;background:#111;color:white;"></textarea>

        <button id="sendBtn" 
        style="margin-top:10px;width:100%;padding:12px;border:none;border-radius:10px;background:#00d2ff;color:black;font-weight:bold;">
        Envoyer
        </button>
    </div>
</div>

<!-- LOGOUT -->
<a href="#" id="logout" class="logout-btn">🚪 Déconnexion</a>

</div>

<!-- NAVBAR -->
<div class="navbar">
    <a href="dashboard.html">📊<br>Dash</a>
    <a href="service.html">🛒<br>Shop</a>
    <a href="profil.html" class="active">👤<br>Profil</a>
</div>

<script type="module" src="profil.js"></script>

</body>
</html>
