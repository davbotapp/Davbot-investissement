<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Davbot Social</title>

<style>
:root{
--blue:#6c5cff;
--dark:#050a14;
--glass:rgba(255,255,255,0.05);
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:var(--dark);
color:white;
}

.header{
text-align:center;
padding:20px;
color:var(--blue);
font-size:20px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:12px;
padding:15px;
}

/* CARD */
.card{
background:var(--glass);
padding:15px;
border-radius:15px;
text-align:center;
cursor:pointer;
transition:0.3s;
border:1px solid rgba(255,255,255,0.1);
}

.card:hover{
transform:scale(1.05);
}

.card.active{
box-shadow:0 0 20px var(--blue);
border:1px solid var(--blue);
}

.card img{
width:40px;
height:40px;
margin-bottom:8px;
}

.name{
font-size:13px;
}

/* FORM */
.form{
padding:15px;
}

select,input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:white;
}

/* PRICE */
.price{
text-align:center;
font-size:24px;
color:var(--blue);
margin-top:15px;
font-weight:bold;
}

/* BUTTON */
button{
width:100%;
padding:15px;
margin-top:15px;
background:linear-gradient(45deg,#6c5cff,#00d2ff);
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">📲 Toutes les plateformes</div>

<div class="grid" id="platforms">

<!-- SOCIAL -->
<div class="card" data-type="social" data-name="Facebook">
<img src="https://cdn.simpleicons.org/facebook/1877F2">
<div class="name">Facebook</div>
</div>

<div class="card" data-type="social" data-name="Instagram">
<img src="https://cdn.simpleicons.org/instagram/E4405F">
<div class="name">Instagram</div>
</div>

<div class="card" data-type="social" data-name="TikTok">
<img src="https://cdn.simpleicons.org/tiktok/ffffff">
<div class="name">TikTok</div>
</div>

<div class="card" data-type="social" data-name="YouTube">
<img src="https://cdn.simpleicons.org/youtube/FF0000">
<div class="name">YouTube</div>
</div>

<div class="card" data-type="social" data-name="Twitter">
<img src="https://cdn.simpleicons.org/x/ffffff">
<div class="name">Twitter/X</div>
</div>

<div class="card" data-type="social" data-name="LinkedIn">
<img src="https://cdn.simpleicons.org/linkedin/0A66C2">
<div class="name">LinkedIn</div>
</div>

<div class="card" data-type="social" data-name="Snapchat">
<img src="https://cdn.simpleicons.org/snapchat/FFFC00">
<div class="name">Snapchat</div>
</div>

<!-- MESSAGING -->
<div class="card" data-type="messaging" data-name="WhatsApp">
<img src="https://cdn.simpleicons.org/whatsapp/25D366">
<div class="name">WhatsApp</div>
</div>

<div class="card" data-type="messaging" data-name="Telegram">
<img src="https://cdn.simpleicons.org/telegram/26A5E4">
<div class="name">Telegram</div>
</div>

<div class="card" data-type="messaging" data-name="Discord">
<img src="https://cdn.simpleicons.org/discord/5865F2">
<div class="name">Discord</div>
</div>

<div class="card" data-type="messaging" data-name="Messenger">
<img src="https://cdn.simpleicons.org/messenger/00B2FF">
<div class="name">Messenger</div>
</div>

<div class="card" data-type="messaging" data-name="Threads">
<img src="https://cdn.simpleicons.org/threads/ffffff">
<div class="name">Threads</div>
</div>

</div>

<!-- FORM -->
<div class="form">

<select id="plan">
<option value="cheap">💸 Moins cher</option>
<option value="premium">🔥 Meilleur prix</option>
</select>

<select id="type">
<option>Likes</option>
<option>Vues</option>
<option>Followers</option>
<option>Membre Groupe</option>
<option>Membre Chaîne</option>
<option>Membre Canal</option>
</select>

<input type="number" id="nombre" placeholder="Quantité">

<input type="text" id="link" placeholder="🔗 Lien">

<div class="price" id="price">0 FC</div>

<button id="btn">🚀 Commander</button>

</div>

<script src="social.js"></script>

</body>
</html>
