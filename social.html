<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Davbot Social</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
--blue:#6c5cff;
--cyan:#00d2ff;
--dark:#050a14;
--glass:rgba(255,255,255,0.05);
}

/* BODY */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background: radial-gradient(circle at top,#0b1c2c,#050a14);
color:white;
}

/* ===== BANNIÈRE ===== */
.banner{
width:100%;
height:160px;
overflow:hidden;
position:relative;
}

.banner img{
width:100%;
height:100%;
object-fit:cover;
}

.banner::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to bottom,transparent,#050a14);
}

/* HEADER */
.header{
text-align:center;
padding:15px 10px;
}

.header h2{
margin:0;
color:var(--cyan);
}

.header p{
opacity:0.6;
font-size:13px;
margin-top:5px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

/* CARD */
.card{
background:var(--glass);
padding:12px;
border-radius:12px;
text-align:center;
cursor:pointer;
transition:0.3s;
border:1px solid rgba(255,255,255,0.08);
}

.card:hover{
transform:translateY(-3px);
}

.card.active{
border:1px solid var(--cyan);
box-shadow:0 0 15px rgba(0,210,255,0.4);
}

/* ICON */
.card img{
width:36px;
height:36px;
margin-bottom:6px;
}

/* NAME */
.name{
font-size:12px;
}

/* FORM */
.form{
padding:12px;
max-width:500px;
margin:auto;
}

/* INPUTS */
select,input{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.06);
color:white;
font-size:13px;
outline:none;
}

select:focus,input:focus{
box-shadow:0 0 10px var(--cyan);
}

/* PRICE */
.price{
text-align:center;
font-size:22px;
color:var(--cyan);
margin-top:12px;
font-weight:bold;
}

/* BTN */
button{
width:100%;
padding:13px;
margin-top:12px;
background:linear-gradient(90deg,var(--blue),var(--cyan));
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}
</style>
</head>

<body>

<!-- 🔥 BANNIÈRE -->
<div class="banner">
<img src="https://i.ibb.co/3V38pKK/file-00000000bb7871f7807893baa360b9e6.png">
</div>

<!-- HEADER -->
<div class="header">
<h2><i class="fa-solid fa-share-nodes"></i> Réseaux Sociaux</h2>
<p>Boost tes réseaux en quelques secondes 🚀</p>
</div>

<!-- PLATEFORMES -->

<div class="grid" id="platforms">

<!-- 🔥 SOCIAL -->
<div class="card" data-name="Facebook">
<img src="https://cdn.simpleicons.org/facebook/1877F2">
<div class="name">Facebook</div>
</div>

<div class="card" data-name="Instagram">
<img src="https://cdn.simpleicons.org/instagram/E4405F">
<div class="name">Instagram</div>
</div>

<div class="card" data-name="TikTok">
<img src="https://cdn.simpleicons.org/tiktok/ffffff">
<div class="name">TikTok</div>
</div>

<div class="card" data-name="YouTube">
<img src="https://cdn.simpleicons.org/youtube/FF0000">
<div class="name">YouTube</div>
</div>

<div class="card" data-name="Twitter">
<img src="https://cdn.simpleicons.org/x/ffffff">
<div class="name">Twitter/X</div>
</div>

<div class="card" data-name="LinkedIn">
<img src="https://cdn.simpleicons.org/linkedin/0A66C2">
<div class="name">LinkedIn</div>
</div>

<!-- 🔥 MESSAGERIE -->
<div class="card" data-name="WhatsApp">
<img src="https://cdn.simpleicons.org/whatsapp/25D366">
<div class="name">WhatsApp</div>
</div>

<div class="card" data-name="Telegram">
<img src="https://cdn.simpleicons.org/telegram/26A5E4">
<div class="name">Telegram</div>
</div>

<div class="card" data-name="Discord">
<img src="https://cdn.simpleicons.org/discord/5865F2">
<div class="name">Discord</div>
</div>

<div class="card" data-name="Messenger">
<img src="https://cdn.simpleicons.org/messenger/0084FF">
<div class="name">Messenger</div>
</div>

<div class="card" data-name="Signal">
<img src="https://cdn.simpleicons.org/signal/3A76F0">
<div class="name">Signal</div>
</div>

<!-- 🔥 AUTRES -->
<div class="card" data-name="Snapchat">
<img src="https://cdn.simpleicons.org/snapchat/FFFC00">
<div class="name">Snapchat</div>
</div>

<div class="card" data-name="Pinterest">
<img src="https://cdn.simpleicons.org/pinterest/E60023">
<div class="name">Pinterest</div>
</div>

<div class="card" data-name="Threads">
<img src="https://cdn.simpleicons.org/threads/ffffff">
<div class="name">Threads</div>
</div>

<div class="card" data-name="Reddit">
<img src="https://cdn.simpleicons.org/reddit/FF4500">
<div class="name">Reddit</div>
</div>

<div class="card" data-name="Twitch">
<img src="https://cdn.simpleicons.org/twitch/9146FF">
<div class="name">Twitch</div>
</div>

<div class="card" data-name="Spotify">
<img src="https://cdn.simpleicons.org/spotify/1DB954">
<div class="name">Spotify</div>
</div>

</div>

<!-- FORM -->
<div class="form">

<select id="plan">
<option value="cheap">💸 meilleures prix du marché</option>
<option value="premium"> 💸Premium rapide✅</option>
</select>

<select id="type">

<!-- 🔥 ENGAGEMENT -->
<option>❤️ Likes</option>
<option>👁️ Vues</option>
<option>💬 Commentaires</option>
<option>🔁 Partages</option>

<!-- 👥 CROISSANCE -->
<option>👤 Followers</option>
<option>🧑‍🤝‍🧑 Membres Groupe</option>
<option>📢 Membres Canal</option>
<option>📩 Abonnés WhatsApp</option>

<!-- 🔥 PREMIUM -->
<option>🔥 Likes réels</option>
<option>🚀 Followers actifs</option>
<option>🎯 Ciblage par pays</option>

<!-- 💰 PACK -->
<option>🛒 Pack complet like vue </option>
  <option>🛒 Pack complet Like commentaires</option>
<option>⚡ Boost viral</option>
<option>📊 Analyse compte</option>

</select>
<input type="number" id="nombre" placeholder="Quantité (ex: 1000)">
<input type="text" id="link" placeholder="🔗 Lien du profil ou post">

<div class="price" id="price">0 FC</div>

<button onclick="valider()">
<i class="fa-solid fa-paper-plane"></i> Commander
</button>

</div>

<script type="module" src="social.js"></script>

<!-- SCRIPT SELECTION -->
<script>
let selected = "";

document.querySelectorAll(".card").forEach(card=>{
card.onclick = ()=>{
document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
card.classList.add("active");
selected = card.dataset.name;
};
});
</script>

</body>
</html>
