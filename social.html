<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Davbot Social</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
--blue:#6c5cff;
--cyan:#00d2ff;
--dark:#050a14;
--glass:rgba(255,255,255,0.05);
}

/* BODY */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background: radial-gradient(circle at top,#0b1c2c,#050a14);
color:white;
}

/* HEADER */
.header{
text-align:center;
padding:20px 10px;
}

.header h2{
margin:0;
color:var(--cyan);
}

.header p{
opacity:0.6;
font-size:13px;
margin-top:5px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

/* CARD */
.card{
background:var(--glass);
padding:12px;
border-radius:12px;
text-align:center;
cursor:pointer;
transition:0.3s;
border:1px solid rgba(255,255,255,0.08);
position:relative;
overflow:hidden;
}

.card:hover{
transform:translateY(-3px);
}

.card.active{
border:1px solid var(--cyan);
box-shadow:0 0 15px rgba(0,210,255,0.4);
}

/* ICON */
.card img{
width:32px;
height:32px;
margin-bottom:6px;
}

/* NAME */
.name{
font-size:12px;
}

/* FORM */
.form{
padding:12px;
max-width:500px;
margin:auto;
}

/* INPUTS */
select,input{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.06);
color:white;
font-size:13px;
outline:none;
}

/* INPUT FOCUS */
select:focus,input:focus{
box-shadow:0 0 10px var(--cyan);
}

/* PRICE */
.price{
text-align:center;
font-size:22px;
color:var(--cyan);
margin-top:12px;
font-weight:bold;
animation:fadeIn 0.5s;
}

/* BTN */
button{
width:100%;
padding:13px;
margin-top:12px;
background:linear-gradient(90deg,var(--blue),var(--cyan));
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="header">
<h2><i class="fa-solid fa-share-nodes"></i> Réseaux Sociaux</h2>
<p>Boost tes réseaux en quelques secondes 🚀</p>
</div>

<!-- PLATEFORMES -->
<div class="grid" id="platforms">

<div class="card" data-type="social" data-name="Facebook">
<img src="https://cdn.simpleicons.org/facebook/1877F2">
<div class="name">Facebook</div>
</div>

<div class="card" data-type="social" data-name="Instagram">
<img src="https://cdn.simpleicons.org/instagram/E4405F">
<div class="name">Instagram</div>
</div>

<div class="card" data-type="social" data-name="TikTok">
<img src="https://cdn.simpleicons.org/tiktok/ffffff">
<div class="name">TikTok</div>
</div>

<div class="card" data-type="social" data-name="YouTube">
<img src="https://cdn.simpleicons.org/youtube/FF0000">
<div class="name">YouTube</div>
</div>

<div class="card" data-type="social" data-name="Twitter">
<img src="https://cdn.simpleicons.org/x/ffffff">
<div class="name">Twitter/X</div>
</div>

<div class="card" data-type="social" data-name="LinkedIn">
<img src="https://cdn.simpleicons.org/linkedin/0A66C2">
<div class="name">LinkedIn</div>
</div>

<div class="card" data-type="messaging" data-name="WhatsApp">
<img src="https://cdn.simpleicons.org/whatsapp/25D366">
<div class="name">WhatsApp</div>
</div>

<div class="card" data-type="messaging" data-name="Telegram">
<img src="https://cdn.simpleicons.org/telegram/26A5E4">
<div class="name">Telegram</div>
</div>

<div class="card" data-type="messaging" data-name="Discord">
<img src="https://cdn.simpleicons.org/discord/5865F2">
<div class="name">Discord</div>
</div>

</div>

<!-- FORM -->
<div class="form">

<select id="plan">
<option value="cheap">💸 Moins cher</option>
<option value="premium">🔥 Premium rapide</option>
</select>

<select id="type">
<option>Likes</option>
<option>Vues</option>
<option>Followers</option>
<option>Membres Groupe</option>
<option>Membres Chaîne</option>
<option>Membres Canal</option>
</select>

<input type="number" id="nombre" placeholder="Quantité (ex: 1000)">
<input type="text" id="link" placeholder="🔗 Lien du profil ou post">

<div class="price" id="price">0 FC</div>

<button onclick="valider()">
<i class="fa-solid fa-paper-plane"></i> Commander
</button>

</div>

<script type="module" src="social.js"></script>

</body>
</html>
