<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Disque P7</title>

<style>
body{background:#050a14;color:white;text-align:center;}
.disk{width:60px;height:60px;background:#222;border-radius:50%;display:inline-block;margin:10px;}
</style>
</head>

<body>

<h2>🔴 Disque P7</h2>

<div id="d"></div>
<p id="res"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({apiKey:"AIza...",databaseURL:"https://starlink-investit-default-rtdb.firebaseio.com"});
const db = getDatabase(app);
const user = localStorage.getItem("userPhone");

let good=Math.floor(Math.random()*4);

for(let i=0;i<4;i++){
let d=document.createElement("div");
d.className="disk";

d.onclick=async()=>{
const snap = await get(ref(db,"users/"+user));
const data = snap.val();

let gain = (i===good)?30000:0;

if((data.todayGain||0)>=30000) gain=0;

await update(ref(db,"users/"+user),{
points:(data.points||0)+gain,
todayGain:(data.todayGain||0)+gain,
totalPlayed:(data.totalPlayed||0)+1
});

document.getElementById("res").innerText =
gain?"🎉 Jackpot":"❌ Perdu";
};

document.getElementById("d").appendChild(d);
}
</script>

</body>
</html>
