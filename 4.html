<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tâche 4 – Coffre Mystère</title>

<style>
body{
  margin:0;
  background:radial-gradient(circle at top,#0b0f2a,#000);
  font-family:Arial,sans-serif;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:95%;
  max-width:420px;
  background:#121a44;
  padding:25px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 0 40px rgba(0,0,255,.3);
}

h2{
  color:#6aa3ff;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:20px;
}

.box{
  height:80px;
  background:#050c2e;
  border-radius:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:1.5rem;
  cursor:pointer;
  transition:.2s;
}

.box:hover{
  transform:scale(1.05);
  background:#1a2a6c;
}

.result{
  margin-top:15px;
  font-weight:bold;
}

.success{color:#00ffb3}
.fail{color:#ff4d6d}
.note{font-size:.8rem;opacity:.7;margin-top:10px}
</style>

</head>
<body>

<div class="card">
<h2>🎯 Coffre Mystère PRO</h2>
<p>Choisis un coffre…</p>

<div class="grid" id="grid"></div>

<div class="result" id="result"></div>
<div class="note">Système intelligent équilibré</div>

</div>
<script type="module" src="4.js"></script>

</body>
</html>
