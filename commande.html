<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commander</title>

<style>
:root { 
    --blue:#00d2ff; 
    --dark:#050a14; 
    --glass:rgba(255,255,255,0.05);
}

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: var(--dark) url('IMG_0870.jpeg') no-repeat center center fixed;
    background-size: cover;
    color:white;
}

.overlay{
    background:rgba(5,10,20,0.85);
    min-height:100vh;
    padding:20px;
}

h2{
    text-align:center;
    color:var(--blue);
}

.card{
    background:var(--glass);
    border:1px solid rgba(0,210,255,0.2);
    border-radius:20px;
    padding:20px;
    margin-top:20px;
    backdrop-filter: blur(10px);
}

input, select, textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:none;
    background:rgba(255,255,255,0.1);
    color:white;
}

button{
    width:100%;
    padding:14px;
    background:var(--blue);
    border:none;
    border-radius:10px;
    font-weight:bold;
    margin-top:15px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    opacity:0.9;
}

button:active{
    transform:scale(0.97);
}

#voirBtn{
    background:#4caf50;
    display:none;
}

.price{
    text-align:center;
    margin-top:10px;
    font-weight:bold;
    color:#4caf50;
    font-size:18px;
}

.back{
    text-align:center;
    margin-top:15px;
}

.back a{
    color:white;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="overlay">

<h2>📦 Commander un service</h2>

<div class="card">

<!-- SERVICE -->
<input type="text" id="serviceName" placeholder="Service" readonly>

<!-- FORM DYNAMIQUE -->
<div id="formZone"></div>

<!-- PRIX -->
<div class="price">
Prix : <span id="price">0</span> FC
</div>

<!-- ACTIONS -->
<button onclick="valider()">✅ Valider la commande</button>

<button id="voirBtn">👁️ Voir mon hébergement</button>

</div>

<div class="back">
<a href="service.html">← Retour</a>
</div>

</div>

<!-- SCRIPT -->
<script type="module">
import "./cmd.js";

// 🔥 ACTIVER BOUTON VOIR SI HÉBERGEMENT
const service = localStorage.getItem("serviceCommande");
const voirBtn = document.getElementById("voirBtn");

if(service === "Hébergement"){
    voirBtn.style.display = "block";

    voirBtn.onclick = ()=>{
        window.location.href = "heberge.html";
    };
}
</script>

</body>
</html>
