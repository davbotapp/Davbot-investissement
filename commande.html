<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commander un service</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; }

body {
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:var(--dark);
    color:white;
    padding:20px;
}

h2 {
    text-align:center;
    color:var(--blue);
}

.card {
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:15px;
    margin-top:20px;
    border:1px solid rgba(0,210,255,0.2);
}

input, select, textarea {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    background:rgba(255,255,255,0.1);
    color:white;
    outline:none;
}

textarea {
    min-height:80px;
}

button {
    width:100%;
    padding:15px;
    background:var(--blue);
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:active {
    transform:scale(0.97);
}

.price {
    margin-top:10px;
    font-weight:bold;
    color:#4caf50;
    text-align:center;
    font-size:18px;
}

.back {
    text-align:center;
    margin-top:15px;
    font-size:13px;
}
.back a {
    color:white;
    text-decoration:none;
}
</style>
</head>

<body>

<h2>📦 Commander un service</h2>

<div class="card">

    <!-- SERVICE -->
    <label>Service sélectionné</label>
    <input type="text" id="serviceName" readonly>

    <!-- FORMULAIRE DYNAMIQUE -->
    <div id="formZone"></div>

    <!-- PRIX -->
    <div class="price">
        Prix : <span id="price">0</span> FC
    </div>

    <!-- BTN -->
    <button onclick="valider()">Valider la commande</button>

</div>

<div class="back">
    <a href="shop.html">← Retour</a>
</div>

<!-- JS -->
<script type="module" src="cmd.js"></script>

</body>
</html>
