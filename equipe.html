<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Équipe</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; }

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:var(--dark);
    color:white;
    padding:20px;
}

/* HEADER */
h2{
    text-align:center;
    color:var(--blue);
}

/* CARD */
.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(0,210,255,0.2);
    border-radius:15px;
    padding:20px;
    margin-top:20px;
    backdrop-filter: blur(10px);
}

/* CODE */
.code{
    font-size:26px;
    color:var(--blue);
    font-weight:bold;
    margin:15px 0;
    text-align:center;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    margin-top:15px;
}

.box{
    background:#111;
    padding:12px;
    border-radius:10px;
    text-align:center;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:var(--blue);
    border:none;
    border-radius:10px;
    font-weight:bold;
    margin-top:10px;
    cursor:pointer;
}

button:active{
    transform:scale(0.95);
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
    margin-top:10px;
    background:#111;
    color:white;
}
</style>
</head>

<body>

<h2>👥 Mon Équipe</h2>

<!-- 🔗 PARRAINAGE -->
<div class="card">
    <p>Votre code de parrainage</p>
    <div class="code" id="code">...</div>

    <button id="copyBtn">📋 Copier lien</button>
    <button id="whatsappBtn">📤 Partager WhatsApp</button>
</div>

<!-- 📊 NIVEAUX -->
<div class="grid">
    <div class="box">Niveau 1<br><b id="lvl1">0</b></div>
    <div class="box">Niveau 2<br><b id="lvl2">0</b></div>
    <div class="box">Niveau 3<br><b id="lvl3">0</b></div>
</div>

<!-- 💰 STATS -->
<div class="card">
    👥 Total : <b id="total">0</b><br>
    💰 Gains : <b id="gains">0</b> FC<br>
    ⭐ Points : <b id="points">0</b>
</div>

<!-- 🔗 LIENS WHATSAPP -->
<div class="card">
    <h3>📲 Communauté</h3>

    <input type="text" id="whatsappChannel" placeholder="🔗 Lien chaîne WhatsApp">
    <button onclick="openLink('whatsappChannel')">Voir la chaîne</button>

    <input type="text" id="whatsappGroup" placeholder="👥 Lien groupe WhatsApp">
    <button onclick="openLink('whatsappGroup')">Voir la communauté</button>
</div>

<script type="module" src="equipe.js"></script>

<script>
// 🔗 ouvrir lien
function openLink(id){
    const link = document.getElementById(id).value;

    if(!link || !link.includes("http")){
        alert("❌ Lien invalide");
        return;
    }

    window.open(link, "_blank");
}
</script>

</body>
</html>
