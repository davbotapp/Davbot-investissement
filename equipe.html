<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Équipe</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; }

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:var(--dark);
    color:white;
    padding:20px;
}

h2{text-align:center;}

.card{
    background:#111;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
    text-align:center;
}

.code{
    font-size:28px;
    color:var(--blue);
    font-weight:bold;
    margin:15px 0;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    margin-top:20px;
}

.box{
    background:#111;
    padding:10px;
    border-radius:10px;
}

button{
    width:100%;
    padding:15px;
    background:var(--blue);
    border:none;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<h2>👥 Mon Équipe</h2>

<div class="card">
    <p>Votre code</p>
    <div class="code" id="code">...</div>

    <button id="copyBtn">📋 Copier lien</button>
    <button id="whatsappBtn">📤 Partager WhatsApp</button>
</div>

<div class="grid">
    <div class="box">
        Niveau 1
        <b id="lvl1">0</b>
    </div>
    <div class="box">
        Niveau 2
        <b id="lvl2">0</b>
    </div>
    <div class="box">
        Niveau 3
        <b id="lvl3">0</b>
    </div>
</div>

<div class="card">
    👥 Total : <b id="total">0</b><br>
    💰 Gains : <b id="gains">0</b> FC<br>
    ⭐ Points gagnés : <b id="points">0</b>
</div>

<script type="module" src="equipe.js"></script>

</body>
</html>
