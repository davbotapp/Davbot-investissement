<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Équipe</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; }

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:var(--dark);
    color:white;
    padding:20px;
}

/* HEADER */
h2{
    text-align:center;
    color:var(--blue);
}

/* CARD */
.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(0,210,255,0.2);
    border-radius:15px;
    padding:20px;
    margin-top:20px;
}

/* CODE */
.code{
    font-size:26px;
    color:var(--blue);
    font-weight:bold;
    margin:15px 0;
    text-align:center;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    margin-top:15px;
}

.box{
    background:#111;
    padding:12px;
    border-radius:10px;
    text-align:center;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:var(--blue);
    border:none;
    border-radius:10px;
    font-weight:bold;
    margin-top:10px;
    cursor:pointer;
}

button:active{
    transform:scale(0.95);
}
</style>
</head>

<body>

<h2>👥 Mon Équipe</h2>

<!-- 🔗 PARRAINAGE -->
<div class="card">
    <p>Votre code de parrainage</p>
    <div class="code" id="code">...</div>

    <button id="copyBtn">📋 Copier lien</button>
    <button id="whatsappBtn">📤 Partager WhatsApp</button>
</div>

<!-- 📊 NIVEAUX -->
<div class="grid">
    <div class="box">Niveau 1<br><b id="lvl1">0</b></div>
    <div class="box">Niveau 2<br><b id="lvl2">0</b></div>
    <div class="box">Niveau 3<br><b id="lvl3">0</b></div>
</div>

<!-- 💰 STATS -->
<div class="card">
    👥 Total : <b id="total">0</b><br>
    💰 Gains : <b id="gains">0</b> FC<br>
    ⭐ Points : <b id="points">0</b>
</div>

<!-- 🔥 WHATSAPP DIRECT -->
<div class="card">
    <h3>📲 Communauté</h3>

    <button onclick="openLink('channel')">
        📢 Rejoindre la chaîne WhatsApp
    </button>

    <button onclick="openLink('group')">
        👥 Rejoindre la communauté WhatsApp
    </button>
        <button onclick="openLink('Page')">
  🤖 page Facebook officielle 
        </button>
        <button onclick="openLink('portfolio')">
        🧑‍💻 visiter notre portfolio 
        </button>
</div>

<script type="module" src="equipe.js"></script>

<script>
// 🔗 ouvrir lien direct
function openLink(type){

    let link = "";

    if(type === "channel"){
        link = "https://whatsapp.com/channel/0029VbBrUCl6buMF5srz5U2L";
    }

    if(type === "group"){
        link = "https://chat.whatsapp.com/KyzoGEXunBA7g2htNDjMPm";
    }
if(type === "portfolio"){
        link = "https://portfolio-david-mpongo-chi.vercel.app/";
        }
    if(type === "Page"){
        link = "https://www.facebook.com/profile.php?id=61574231859267";
    }
    
    window.open(link, "_blank");
}
</script>

</body>
</html>
