<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recharge - Davbot</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; }

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:var(--dark) url('IMG_0870.jpeg') no-repeat center center fixed;
    background-size:cover;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.overlay{
    background:rgba(5,10,20,0.9);
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:rgba(0,0,0,0.85);
    padding:25px;
    border-radius:20px;
    width:90%;
    max-width:400px;
    border:1px solid var(--blue);
    backdrop-filter:blur(10px);
}

h2{
    text-align:center;
    color:var(--blue);
}

/* 🔥 Currency */
select{
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    background:rgba(255,255,255,0.08);
    color:white;
}

/* inputs */
input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    background:rgba(255,255,255,0.08);
    color:white;
}

/* preview */
.preview{
    background:rgba(0,210,255,0.1);
    padding:10px;
    border-radius:10px;
    text-align:center;
    margin-top:5px;
    font-size:14px;
}

/* info */
.info{
    font-size:13px;
    opacity:0.8;
    margin:10px 0;
}

/* button */
button{
    width:100%;
    padding:15px;
    background:var(--blue);
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

button:disabled{
    background:#444;
}

/* back */
.back{
    text-align:center;
    margin-top:10px;
    font-size:13px;
}
.back a{
    color:white;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="overlay">
<div class="card">

<h2>💰 Recharge</h2>

<!-- 💰 MONTANT -->
<input type="number" id="amount" placeholder="Montant">

<!-- 💱 DEVISE -->
<select id="currency">
<option value="FC">Franc Congolais (FC)</option>
<option value="USD">Dollar ($)</option>
</select>

<!-- 🔥 PREVIEW -->
<div id="preview" class="preview"></div>

<!-- ℹ️ INFO -->
<div class="info">
📱 <b>Paiement :</b> 243 982697752<br><br>

💰 <b>Montant :</b> doit être exact<br>
🧾 <b>ID :</b> obligatoire après paiement<br>
⏳ <b>Délai :</b> 0 à 1 heure<br><br>

⚠️ Si le montant est faux → perte possible<br>
</div>

<!-- 🧾 TRANSACTION -->
<input type="text" id="tid" placeholder="ID Transaction">

<!-- 🚀 BTN -->
<button id="btn">Envoyer</button>

<div class="back">
<a href="profil.html">← Retour</a>
</div>

</div>
</div>

<!-- 🔥 SCRIPT -->
<script type="module" src="recharge.js"></script>

</body>
</html>
