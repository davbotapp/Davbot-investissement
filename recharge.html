<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recharge - Starlink</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; }

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:var(--dark) url('IMG_0870.jpeg') no-repeat center center fixed;
    background-size:cover;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.overlay{
    background:rgba(5,10,20,0.9);
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:rgba(0,0,0,0.85);
    padding:25px;
    border-radius:20px;
    width:90%;
    max-width:400px;
    border:1px solid var(--blue);
    backdrop-filter:blur(10px);
}

h2{
    text-align:center;
    color:var(--blue);
}

.price-grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    margin-top:15px;
}

.price-item{
    padding:12px;
    background:rgba(255,255,255,0.08);
    text-align:center;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.price-item.active{
    background:var(--blue);
    color:black;
    font-weight:bold;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    background:rgba(255,255,255,0.08);
    color:white;
}

.info{
    font-size:13px;
    opacity:0.8;
    margin:10px 0;
}

button{
    width:100%;
    padding:15px;
    background:var(--blue);
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

button:disabled{
    background:#444;
}

.back{
    text-align:center;
    margin-top:10px;
    font-size:13px;
}
.back a{
    color:white;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="overlay">
<div class="card">

<h2>💰 Recharge</h2>

<div class="price-grid">
<div class="price-item" data-val="5 000">5000</div>
<div class="price-item" data-val="2 000">18000</div>
<div class="price-item" data-val="15 000">65000</div>
<div class="price-item" data-val="30 000">260000</div>
<div class="price-item" data-val="20 000">470000</div>
<div class="price-item" data-val="10 000">1000000</div>
</div>

<input type="number" id="amount" placeholder="Montant">

<div class="info">
📱 Paiement Airtel dans le numéro 👉: <b>243 982697752</b><br>
⚠️ Envoyer puis entrer l’ID de transaction
    ✅ validation de 0 à 1h 
</div>

<input type="text" id="tid" placeholder="ID Transaction">

<button id="btn">Envoyer</button>

<div class="back">
<a href="profil.html">← Retour</a>
</div>

</div>
</div>

<script type="module" src="recharge.js"></script>

</body>
</html>
