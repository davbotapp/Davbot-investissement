<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recharge - DAVBOT</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; }

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:var(--dark);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:#111;
    padding:25px;
    border-radius:20px;
    width:90%;
    max-width:400px;
}

.price-grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
}

.price-item{
    padding:10px;
    background:#222;
    text-align:center;
    border-radius:10px;
    cursor:pointer;
}

.price-item.active{
    background:#00d2ff;
    color:black;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    background:#000;
    color:white;
}

button{
    width:100%;
    padding:15px;
    background:#00d2ff;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

button:disabled{
    background:#444;
}
</style>
</head>

<body>

<div class="card">

<h2>💰 Recharge</h2>

<div class="price-grid">
<div class="price-item" data-val="5000">5000</div>
<div class="price-item" data-val="18000">18000</div>
<div class="price-item" data-val="65000">65000</div>
<div class="price-item" data-val="260000">260000</div>
<div class="price-item" data-val="470000">470000</div>
<div class="price-item" data-val="1000000">1000000</div>
</div>

<input type="number" id="amount" placeholder="Montant">

<div>
📱 Airtel : 243 982697752<br>

</div>

<input type="text" id="tid" placeholder="ID Transaction">

<button id="btn">Envoyer</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSy...",
authDomain:"starlink-investit.firebaseapp.com",
databaseURL:"https://starlink-investit-default-rtdb.firebaseio.com",
projectId:"starlink-investit",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const user = localStorage.getItem("userPhone");
if(!user) location.href="index.html";

// 🎯 SELECT PRIX
document.querySelectorAll(".price-item").forEach(el=>{
    el.onclick=()=>{
        document.querySelectorAll(".price-item").forEach(i=>i.classList.remove("active"));
        el.classList.add("active");
        document.getElementById("amount").value = el.dataset.val;
    };
});

// 🚀 ENVOI DEMANDE
document.getElementById("btn").onclick = async ()=>{

    const btn = document.getElementById("btn");
    const amount = parseInt(document.getElementById("amount").value);
    const tid = document.getElementById("tid").value.trim();

    if(!amount || amount < 5000){
        return alert("Minimum 5000 FC");
    }

    if(tid.length < 5){
        return alert("ID invalide");
    }

    try{
        btn.disabled = true;
        btn.innerText = "Envoi...";

        const newRef = push(ref(db,"demandes_recharges"));

        await set(newRef,{
            user: user,
            amount: amount,
            tid: tid,
            status: "pending",
            date: Date.now()
        });

        alert("✅ Envoyé, en attente validation admin");
        location.href="dashboard.html";

    }catch(e){
        alert("Erreur");
        console.error(e);
        btn.disabled = false;
        btn.innerText = "Envoyer";
    }
};
</script>

</body>
</html>
