<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Création Application</title>

<style>
:root{
    --blue:#00d2ff;
    --dark:#050a14;
    --glass:rgba(255,255,255,0.05);
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: var(--dark);
    color:white;
}

.overlay{
    background:rgba(5,10,20,0.95);
    min-height:100vh;
    padding:20px;
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.header h2{
    color:var(--blue);
}

.card{
    background:var(--glass);
    border-radius:20px;
    padding:20px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:none;
    background:rgba(255,255,255,0.08);
    color:white;
}

.types{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.type-item{
    padding:10px;
    text-align:center;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    cursor:pointer;
}

.type-item.active{
    background:var(--blue);
    color:black;
}

.speed{
    display:flex;
    gap:10px;
}

.speed div{
    flex:1;
    padding:10px;
    text-align:center;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    cursor:pointer;
}

.speed .active{
    background:var(--blue);
    color:black;
}

.price{
    text-align:center;
    font-size:22px;
    color:var(--blue);
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:var(--blue);
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="overlay">

<div class="header">
<h2>📱 Création Application</h2>
<p>Crée ton app comme un pro 🚀</p>
</div>

<div class="card">

<input id="name" placeholder="Nom de l'application">

<div class="types" id="types">
<div class="type-item">E-commerce</div>
<div class="type-item">Réseau Social</div>
<div class="type-item">Jeu</div>
<div class="type-item">Business</div>
<div class="type-item">Streaming</div>
<div class="type-item">Autre</div>
</div>

<input id="theme" placeholder="Thème">
<input id="color" placeholder="Couleur">

<textarea id="desc" placeholder="Description"></textarea>

<input type="file" id="icon">
<input type="file" id="pub">

<h3>⚡ Traitement</h3>

<div class="speed" id="speed">
<div data-price="45000" class="active">🐢 Lent</div>
<div data-price="55000">⚡ Rapide</div>
</div>

<div class="price" id="price">45000 FC</div>

<button onclick="valider()">🚀 Commander</button>

</div>

</div>

<script type="module" src="application.js"></script>

</body>
</html>
