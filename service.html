<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starlink - Services</title>

<style>
:root { 
    --blue:#00d2ff; 
    --dark:#050a14; 
    --glass:rgba(255,255,255,0.05);
}

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: var(--dark) url('IMG_0870.jpeg') no-repeat center center fixed;
    background-size: cover;
    color:white;
}

.overlay{
    background:rgba(5,10,20,0.85);
    min-height:100vh;
    padding:20px;
}

/* HEADER */
.header{
    text-align:center;
    margin-bottom:20px;
}

.header h2{
    color:var(--blue);
}

/* CARD */
.card{
    background:var(--glass);
    border:1px solid rgba(0,210,255,0.2);
    border-radius:20px;
    padding:15px;
    margin-top:15px;
    display:flex;
    align-items:center;
    backdrop-filter: blur(10px);
}

/* ICON */
.icon{
    font-size:30px;
    margin-right:15px;
}

/* CONTENT */
.content{
    flex:1;
}

.title{
    color:var(--blue);
    font-weight:bold;
}

.desc{
    font-size:13px;
    opacity:0.8;
}

/* BUTTON */
button{
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:var(--blue);
    font-weight:bold;
    cursor:pointer;
}

/* NAVBAR */
.navbar{
    position:fixed;
    bottom:0;
    width:100%;
    background:rgba(5,10,20,0.95);
    display:flex;
    justify-content:space-around;
    padding:15px 0;
    border-top:1px solid var(--blue);
}

.nav-link{
    color:white;
    text-decoration:none;
    font-size:12px;
    opacity:0.6;
}

.nav-link.active{
    opacity:1;
    color:var(--blue);
    font-weight:bold;
}
</style>
</head>

<body>

<div class="overlay">

    <div class="header">
        <h2>🚀 Nos Services</h2>
        <p style="opacity:0.7;">Choisissez un service</p>
    </div>

    <div id="services"></div>

</div>
    <p>*</p>

<nav class="navbar">
    <a href="dashboard.html" class="nav-link">📊<br>Dash</a>
    <a href="service.html" class="nav-link active">📡<br>Shop</a>
    <a href="profil.html" class="nav-link">👤<br>Profil</a>
</nav>

<script src="service.js"></script>

</body>
</html>
