<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Davbot - Services</title>

<style>

/* ================= ROOT ================= */
:root{
    --blue:#00d2ff;
    --dark:#050a14;
    --glass:rgba(255,255,255,0.05);
}

/* ================= BODY ================= */
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: var(--dark) url('IMG_0870.jpeg') no-repeat center center fixed;
    background-size: cover;
    color:white;

    opacity:0;
    transition:0.6s;
}

/* ================= OVERLAY ================= */
.overlay{
    background:rgba(5,10,20,0.85);
    min-height:100vh;
    padding:20px;
}

/* ================= HEADER ================= */
.header{
    text-align:center;
    margin-bottom:25px;
}

.header h2{
    color:var(--blue);
    font-size:26px;
    margin-bottom:5px;
}

.header p{
    opacity:0.7;
}

/* ================= GRID ================= */
#services{
    display:grid;
    grid-template-columns:1fr;
    gap:15px;
}

/* ================= CARD ================= */
.card{
    display:flex;
    align-items:center;
    gap:15px;

    background:var(--glass);
    border:1px solid rgba(0,210,255,0.2);
    border-radius:18px;
    padding:15px;

    backdrop-filter:blur(12px);

    transition:0.3s;
}

/* glow hover */
.card:hover{
    box-shadow:0 0 20px rgba(0,210,255,0.4);
}

/* ================= ICON ================= */
.icon{
    font-size:32px;
}

/* ================= CONTENT ================= */
.content{
    flex:1;
}

.title{
    color:var(--blue);
    font-weight:bold;
    font-size:16px;
}

.desc{
    font-size:13px;
    opacity:0.7;
}

/* ================= BUTTON ================= */
.btn{
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;

    background:linear-gradient(45deg,#00d2ff,#3a7bd5);
    color:white;
    font-weight:bold;

    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* ================= NAVBAR ================= */
.navbar{
    position:fixed;
    bottom:0;
    width:100%;

    background:rgba(5,10,20,0.95);
    border-top:1px solid var(--blue);

    display:flex;
    justify-content:space-around;
    padding:12px 0;
}

.nav-link{
    color:white;
    text-decoration:none;
    font-size:12px;
    opacity:0.6;
    text-align:center;
}

.nav-link.active{
    opacity:1;
    color:var(--blue);
    font-weight:bold;
}

/* ================= RESPONSIVE ================= */
@media(min-width:600px){
    #services{
        grid-template-columns:1fr 1fr;
    }
}

</style>
</head>

<body>

<div class="overlay">

    <!-- HEADER -->
    <div class="header">
        <h2>🚀 Nos Services</h2>
        <p>Choisissez un service et lancez votre projet</p>
    </div>

    <!-- SERVICES -->
    <div id="services"></div>

</div>
    <p>🚀</p>

    <!-- ================= SERVICES GRATUITS ================= -->
<div style="
margin-top:30px;
text-align:center;
">

    <div style="
        background:rgba(0,210,255,0.08);
        border:1px solid rgba(0,210,255,0.3);
        padding:15px;
        border-radius:15px;
        backdrop-filter:blur(10px);
    ">

        <h3 style="color:#00d2ff;margin-bottom:5px;">
            🎁 Services gratuits
        </h3>

        <p style="font-size:13px;opacity:0.7;margin-bottom:15px;">
            Découvrez nos outils gratuits pour commencer sans investissement
        </p>

        <button onclick="openFreeServices()" style="
            padding:12px 18px;
            border:none;
            border-radius:12px;
            background:linear-gradient(45deg,#00d2ff,#3a7bd5);
            color:white;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
            box-shadow:0 0 15px rgba(0,210,255,0.3);
        "
        onmouseover="this.style.transform='scale(1.05)'"
        onmouseout="this.style.transform='scale(1)'">

            🚀 Voir les services gratuits
        </button>

    </div>

</div>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="dashboard.html" class="nav-link">📊<br>Dashboard</a>
    <a href="service.html" class="nav-link active">🛒<br>Services</a>
    <a href="profil.html" class="nav-link">👤<br>Profil</a>
</nav>

<!-- JS -->
<script src="service.js"></script>

<script>
// fade in smooth
window.onload = ()=>{
    document.body.style.opacity = "1";
};
</script>

</body>
</html>
