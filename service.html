<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nos Services</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; }

body {
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:var(--dark);
    color:white;
}

.header {
    text-align:center;
    padding:20px;
    border-bottom:1px solid var(--blue);
}

.container {
    padding:20px;
}

.card {
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(0,210,255,0.2);
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
    display:flex;
    align-items:center;
}

.icon {
    font-size:30px;
    margin-right:15px;
}

.content {
    flex:1;
}

.title { color:var(--blue); font-weight:bold; }
.desc { font-size:13px; }

.order-btn {
    background:var(--blue);
    border:none;
    padding:8px 12px;
    border-radius:10px;
    font-weight:bold;
    margin-top:8px;
}
</style>
</head>

<body>

<div class="header">
    <h2>🚀 Nos Services</h2>
</div>

<div class="container" id="services"></div>

<script>

// SERVICES AVEC ICÔNES
const services = [
    { nom:"Application", desc:"Création application mobile", icon:"📱" },
    { nom:"Site Web Pro", desc:"Création site professionnel", icon:"🌐" },
    { nom:"Intelligence Artificielle", desc:"Chatbot et IA", icon:"🤖" },
    { nom:"Réseaux Sociaux", desc:"Boost et gestion comptes", icon:"📲" },
    { nom:"Hébergement", desc:"Serveur rapide et sécurisé", icon:"💾" }
];

// AFFICHAGE
const container = document.getElementById("services");

services.forEach(s=>{
    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
        <div class="icon">${s.icon}</div>

        <div class="content">
            <div class="title">${s.nom}</div>
            <div class="desc">${s.desc}</div>

            <button class="order-btn" onclick="commander('${s.nom}')">
                Commander
            </button>
        </div>
    `;

    container.appendChild(div);
});

// COMMANDER
function commander(service){
    localStorage.setItem("serviceCommande", service);
    window.location.href = "commande.html";
}

</script>

</body>
</html>
