<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tâche 2 – Duel IA</title>

<style>
body{
margin:0;
background:radial-gradient(circle at top,#1a0033,#000);
font-family:Arial,sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:95%;
max-width:500px;
background:#140033;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 40px rgba(255,0,200,.4);
}

h2{color:#ff2bd6;}

button{
margin:6px;
padding:12px 15px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#ff2bd6,#6a00ff);
color:white;
font-weight:bold;
cursor:pointer;
}

#result{margin-top:20px;font-weight:bold;font-size:1.1rem;}
.success{color:#00ffb3;}
.fail{color:#ff4d6d;}

.stats{margin-top:15px;font-size:.9rem;opacity:.8;}
.note{margin-top:10px;font-size:.8rem;opacity:.7;}
</style>
</head>

<body>

<div class="card">
<h2>🤖 Duel IA – Mode PRO</h2>

<p>Choisis une option 👇</p>

<div id="choices">
<button onclick="play(0)">🔴</button>
<button onclick="play(1)">🔵</button>
<button onclick="play(2)">🟢</button>
</div>

<div id="result"></div>
<div class="stats" id="stats"></div>

<div class="note">
Perte 55% • Petit 25% • Moyen 16% • Jackpot 4%
</div>

</div>

<script type="module" src="2.js"></script>

</body>
</html>
