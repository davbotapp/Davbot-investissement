<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Memory G3</title>

<style>
body{background:#050a14;color:white;text-align:center;}
button{padding:15px;background:#00d2ff;}
</style>
</head>

<body>

<h2>🧠 Memory G3</h2>
<button onclick="play()">Jouer</button>
<p id="res"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({apiKey:"AIza...",databaseURL:"https://starlink-investit-default-rtdb.firebaseio.com"});
const db = getDatabase(app);
const user = localStorage.getItem("userPhone");

function smart(d){
let r=Math.random()*100;
let g = r<55?0:r<80?5000:r<96?15000:25000;

if((d.todayGain||0)>=25000) g=0;
if((d.points||0)>200000) g*=0.3;

return Math.floor(g);
}

window.play = async()=>{
const snap = await get(ref(db,"users/"+user));
const d = snap.val();

if(!d.tokenG3) return alert("Jeton requis");

const today = new Date().toDateString();
if(d.memoryDate===today) return alert("Déjà joué");

let gain = smart(d);

await update(ref(db,"users/"+user),{
points:(d.points||0)+gain,
todayGain:(d.todayGain||0)+gain,
memoryDate:today,
totalPlayed:(d.totalPlayed||0)+1
});

document.getElementById("res").innerText = gain?"🎉 "+gain:"❌ Perdu";
};
</script>

</body>
</html>
