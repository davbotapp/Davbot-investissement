<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tâches - DAVBOT</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; }

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:var(--dark);
    color:white;
    padding:20px;
}

h2{
    text-align:center;
    color:var(--blue);
}

.card{
    background:#111;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
    text-align:center;
}

button{
    width:100%;
    padding:15px;
    background:var(--blue);
    border:none;
    border-radius:10px;
    margin-top:10px;
    font-weight:bold;
}

.info{
    margin-top:10px;
    font-size:14px;
    color:#ccc;
}
</style>
</head>

<body>

<h2>🎯 Système de Tâches</h2>

<!-- G3 -->
<div class="card">
    <h3>🪙 Jeton G3</h3>
    <p>Durée : 3 jours</p>
    <p>Prix : 3500 FC</p>
    <p>Jackpot total : 6000 FC</p>

    <button onclick="startTask('G3')">Acheter & Jouer</button>
    <div class="info" id="g3info"></div>
</div>

<!-- P7 -->
<div class="card">
    <h3>🚀 Jeton P7</h3>
    <p>Durée : 7 jours</p>
    <p>Prix : 5000 FC</p>
    <p>Jackpot total : 8000 FC</p>

    <button onclick="startTask('P7')">Acheter & Jouer</button>
    <div class="info" id="p7info"></div>
</div>

<script type="module" src="taches.js"></script>

</body>
</html>
