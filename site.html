<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Création Site Web Pro</title>

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
    --blue:#00d2ff;
    --dark:#050a14;
    --glass:rgba(255,255,255,0.05);
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: radial-gradient(circle at top, #0b1c2c, #050a14);
    color:white;
}

/* ===== LAYOUT ===== */
.overlay{
    min-height:100vh;
    padding:15px;
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.header h2{
    color:var(--blue);
    font-size:22px;
}

.header p{
    opacity:0.7;
    font-size:14px;
}

/* ===== CARD ===== */
.card{
    max-width:600px;
    margin:auto;
    background:var(--glass);
    border-radius:15px;
    padding:15px;
    backdrop-filter:blur(10px);
    border:1px solid rgba(0,210,255,0.2);
    animation:fadeUp 0.5s ease;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* ===== INPUT PRO ===== */
.input-box{
    position:relative;
    margin-bottom:8px;
}

.input-box i{
    position:absolute;
    left:10px;
    top:40%;
    transform:translateY(-50%);
    font-size:13px;
    opacity:0.6;
}

input{
    width:90%;
    height:25px;
    padding:8px 10px 8px 30px;
    border-radius:8px;
    border:none;
    background:rgba(255,255,255,0.06);
    color:white;
    font-size:13px;
}

textarea{
    width:90%;
    height:70px;
    padding:8px 10px 8px 30px;
    border-radius:8px;
    border:none;
    background:rgba(255,255,255,0.06);
    color:white;
    font-size:13px;
    resize:none;
}

/* ===== TYPES ===== */
.types{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-top:8px;
}

.type-item{
    padding:10px;
    text-align:center;
    border-radius:10px;
    background:rgba(255,255,255,0.05);
    cursor:pointer;
    transition:0.3s;
    font-size:13px;
}

.type-item:hover{
    transform:scale(1.05);
}

.type-item.active{
    background:var(--blue);
    color:black;
    font-weight:bold;
}

/* ===== FILE ===== */
.file{
    border:1px dashed var(--blue);
    padding:10px;
    text-align:center;
    border-radius:8px;
    margin-top:8px;
    font-size:13px;
}

/* ===== PRICE ===== */
.price{
    text-align:center;
    font-size:18px;
    color:var(--blue);
    margin-top:10px;
}

/* ===== BUTTON ===== */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00d2ff,#3a7bd5);
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="overlay">

<div class="header">
<h2><i class="fa-solid fa-globe"></i> Création Site Web</h2>
<p>Crée ton site comme une startup 🚀</p>
</div>

<div class="card">

<div class="input-box">
<i class="fa-solid fa-rocket"></i>
<input id="name" placeholder="Nom du site">
</div>

<!-- TYPE -->
<div class="types" id="types">
<div class="type-item"><i class="fa-solid fa-cart-shopping"></i> E-commerce</div>
<div class="type-item"><i class="fa-solid fa-building"></i> Entreprise</div>
<div class="type-item"><i class="fa-solid fa-blog"></i> Blog</div>
<div class="type-item"><i class="fa-solid fa-user"></i> Portfolio</div>
<div class="type-item"><i class="fa-solid fa-bolt"></i> Landing</div>
<div class="type-item"><i class="fa-solid fa-layer-group"></i> Autre</div>
</div>
<p></p>
<div class="input-box">
<i class="fa-solid fa-palette"></i>
<input id="color" placeholder="Couleur principale">
</div>

<div class="input-box">
<i class="fa-solid fa-star"></i>
<input id="importance" placeholder="Importance (Business...)">
</div>

<div class="input-box">
<i class="fa-solid fa-align-left"></i>
<textarea id="desc" placeholder="Description"></textarea>
</div>

<div class="input-box">
<i class="fa-solid fa-gears"></i>
<textarea id="features" placeholder="Fonctionnalités"></textarea>
</div>

<div class="file">
<i class="fa-solid fa-image"></i> Image du projet
<input type="file" id="image">
</div>

<!-- SPEED -->
<div class="types" id="speed">
<div class="type-item active" data-price="35000">🐢 Lent</div>
<div class="type-item" data-price="40000">⚡ Rapide</div>
</div>

<div class="price" id="price">35000 FC</div>

<button onclick="valider()">
<i class="fa-solid fa-paper-plane"></i> Commander
</button>

</div>

</div>

<script type="module" src="site.js"></script>

</body>
</html>
