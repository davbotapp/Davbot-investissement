<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔥 SEO GOOGLE -->
<title>Création de site web professionnel | Davbot 🚀</title>

<meta name="description" content="Crée un site web professionnel avec Davbot 🚀 : e-commerce, entreprise, blog, portfolio ou landing page. Lance ton projet et développe ton business en ligne 💰">

<meta name="keywords" content="création site web, site e-commerce, site entreprise, créer site internet, landing page, portfolio web">

<meta name="robots" content="index, follow">
<link rel="canonical" href="https://tonsite.com/site.html">

<meta name="theme-color" content="#00d2ff">

<!-- 🔥 OPEN GRAPH -->
<meta property="og:title" content="Créer un site web professionnel 🚀">
<meta property="og:description" content="Développe ton site web et ton business en ligne avec Davbot 💰">
<meta property="og:image" content="https://i.imgur.com/zxYUSx2.jpeg">
<meta property="og:type" content="website">

<link rel="icon" href="https://i.imgur.com/zxYUSx2.jpeg">

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
    --blue:#00d2ff;
    --dark:#050a14;
    --glass:rgba(255,255,255,0.05);
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: radial-gradient(circle at top, #0b1c2c, #050a14);
    color:white;
}

/* 🔥 BANNIÈRE */
.banner{
    width:100%;
    height:180px;
    overflow:hidden;
    position:relative;
}

.banner img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.banner::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to bottom,transparent,#050a14);
}

/* LAYOUT */
.overlay{
    min-height:100vh;
    padding:15px;
}

/* HEADER */
.header{
    text-align:center;
    margin-bottom:20px;
}

.header h2{
    color:var(--blue);
    font-size:22px;
}

.header p{
    opacity:0.7;
    font-size:14px;
}

/* CARD */
.card{
    max-width:600px;
    margin:auto;
    background:var(--glass);
    border-radius:15px;
    padding:15px;
    backdrop-filter:blur(10px);
    border:1px solid rgba(0,210,255,0.2);
    animation:fadeUp 0.5s ease;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* INPUT */
.input-box{
    position:relative;
    margin-bottom:8px;
}

.input-box i{
    position:absolute;
    left:10px;
    top:40%;
    transform:translateY(-50%);
    font-size:13px;
    opacity:0.6;
}

input, textarea{
    width:90%;
    padding:8px 10px 8px 30px;
    border-radius:8px;
    border:none;
    background:rgba(255,255,255,0.06);
    color:white;
    font-size:13px;
}

textarea{
    height:70px;
    resize:none;
}

/* TYPES */
.types{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-top:8px;
}

.type-item{
    padding:10px;
    text-align:center;
    border-radius:10px;
    background:rgba(255,255,255,0.05);
    cursor:pointer;
    transition:0.3s;
    font-size:13px;
}

.type-item:hover{
    transform:scale(1.05);
}

.type-item.active{
    background:var(--blue);
    color:black;
    font-weight:bold;
}

/* FILE */
.file{
    border:1px dashed var(--blue);
    padding:10px;
    text-align:center;
    border-radius:8px;
    margin-top:8px;
    font-size:13px;
}

/* PRICE */
.price{
    text-align:center;
    font-size:18px;
    color:var(--blue);
    margin-top:10px;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00d2ff,#3a7bd5);
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<!-- 🔥 IMAGE -->
<div class="banner">
<img src="https://i.imgur.com/zxYUSx2.jpeg">
</div>

<div class="overlay">

<div class="header">

<h2><i class="fa-solid fa-globe"></i> Création Site Web</h2>
<p>Crée ton site et développe ton business 🚀</p>
</div>

<div class="card">

<input placeholder="Nom du site">
<p></p>

<!-- TYPE -->
<div class="types" id="types">
<div class="type-item">🛒 E-commerce</div>
<div class="type-item">🏢 Entreprise</div>
<div class="type-item">📰 Blog</div>
<div class="type-item">👤 Portfolio</div>
<div class="type-item">⚡ Landing</div>
<div class="type-item">📦 Autre</div>
m
</div>
<p></p>
<input placeholder="Couleur principale">
<p></p>
<input placeholder="Importance du projet">
<p></p>
<textarea placeholder="Description"></textarea>
<p></p>
<textarea placeholder="Fonctionnalités"></textarea>

<div>
📷 Image du projet <input type="file">
</div>

<div class="types" id="speed">
<div class="type-item active" data-price="35000">🐢 Lent</div>
<div class="type-item" data-price="40000">⚡ Rapide</div>
</div>

<div class="price" id="price">35000 FC</div>

<button>Commander</button>

</div>

</div>

<!-- 🔥 SEO TEXTE -->
<div style="display:none">
<h2>Créer un site web professionnel</h2>
<p>Crée ton site e-commerce, entreprise ou blog et développe ton activité en ligne avec Davbot.</p>
</div>

<script type="module" src="site.js"></script>

<!-- 🔥 SCRIPT UI -->
<script>
// sélection type
document.querySelectorAll("#types .type-item").forEach(item=>{
item.onclick=()=>{
document.querySelectorAll("#types .type-item").forEach(i=>i.classList.remove("active"));
item.classList.add("active");
};
});

// sélection vitesse + prix
document.querySelectorAll("#speed .type-item").forEach(item=>{
item.onclick=()=>{
document.querySelectorAll("#speed .type-item").forEach(i=>i.classList.remove("active"));
item.classList.add("active");
document.getElementById("price").innerText = item.dataset.price + " FC";
};
});
</script>

</body>
</html>
