<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - DAVBOT</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; }

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:var(--dark);
    color:white;
}

.header{
    text-align:center;
    padding:15px;
    border-bottom:1px solid var(--blue);
}

.tabs{
    display:flex;
    overflow:auto;
    background:#000;
}

.tab{
    padding:10px;
    cursor:pointer;
    font-size:12px;
    white-space:nowrap;
}

.tab.active{
    background:var(--blue);
    color:black;
}

.section{
    display:none;
    padding:15px;
}

.section.active{
    display:block;
}

.card{
    background:#111;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

button{
    padding:6px 10px;
    margin:5px 3px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.ok{background:#4caf50;}
.no{background:#f44336;}
.msg{background:var(--blue); color:black;}

input, textarea{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:none;
    background:#222;
    color:white;
}
</style>
</head>

<body>

<div class="header">
<h2>⚙️ ADMIN PANEL</h2>
</div>

<div class="tabs">
<div class="tab active" onclick="showTab('recharges')">Recharge</div>
<div class="tab" onclick="showTab('retraits')">Retrait</div>
<div class="tab" onclick="showTab('transferts')">Transfert</div>
<div class="tab" onclick="showTab('orders')">Commandes</div>
<div class="tab" onclick="showTab('users')">Users</div>
<div class="tab" onclick="showTab('msg')">Messages</div>
</div>

<!-- SECTIONS -->
<div id="recharges" class="section active"></div>
<div id="retraits" class="section"></div>
<div id="transferts" class="section"></div>
<div id="orders" class="section"></div>
<div id="users" class="section"></div>

<div id="msg" class="section">
    <input type="text" id="phone" placeholder="Numéro utilisateur">
    <textarea id="msgText" placeholder="Message"></textarea>
    <button class="msg" onclick="sendMsg()">Envoyer</button>
</div>

<script type="module" src="admin.js"></script>

<script>
function showTab(id){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

    document.getElementById(id).classList.add("active");
    event.target.classList.add("active");
}
</script>

</body>
</html>
