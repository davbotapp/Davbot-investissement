<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ADMIN</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; --red:#f44336; --green:#4caf50; }

body{background:var(--dark); color:white; font-family:sans-serif; padding:15px;}
.card{background:#111; padding:15px; margin-top:15px; border-radius:10px;}
.user{background:#1a1a1a; padding:10px; margin-top:10px; border-radius:10px;}
button{margin:3px; padding:8px; border:none; border-radius:8px; cursor:pointer;}
.red{background:var(--red);} .green{background:var(--green);} .blue{background:var(--blue);}
</style>
</head>

<body>

<h2>⚙️ ADMIN TOTAL</h2>

<!-- USERS -->
<div class="card">
<h3>👤 Utilisateurs</h3>
<div id="users"></div>
</div>

<!-- TRANSFERT -->
<div class="card">
<h3>🔄 Transfert entre comptes</h3>
<input id="from" placeholder="De (tel)">
<input id="to" placeholder="Vers (tel)">
<input id="amount" placeholder="Montant">
<button onclick="transfer()">Envoyer</button>
</div>

<!-- RETRAITS -->
<div class="card">
<h3>💸 Retraits</h3>
<div id="retraits"></div>
</div>

<!-- RECHARGES -->
<div class="card">
<h3>💰 Recharges</h3>
<div id="recharges"></div>
</div>

<!-- COMMANDES -->
<div class="card">
<h3>📦 Commandes</h3>
<div id="orders"></div>
</div>

<!-- MESSAGE -->
<div class="card">
<h3>📩 Message utilisateur</h3>
<input id="target">
<input id="msg">
<input id="img">
<input id="file">
<button onclick="sendMsg()">Envoyer</button>
</div>

<script type="module" src="admin.js"></script>
</body>
</html>
