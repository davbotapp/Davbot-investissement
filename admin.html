<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN PANEL</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; --green:#4caf50; --red:#f44336; }

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:var(--dark);
    color:white;
}

.header{
    text-align:center;
    padding:20px;
    border-bottom:1px solid var(--blue);
}

.container{ padding:20px; }

.card{
    background:#111;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    margin:5px;
    cursor:pointer;
}

.ok{ background:var(--green); }
.no{ background:var(--red); }

input, textarea{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:none;
    background:#000;
    color:white;
}
</style>
</head>

<body>

<div class="header">
<h2>⚡ ADMIN PANEL</h2>
</div>

<div class="container">

<!-- USERS -->
<div class="card">
<h3>👤 Utilisateurs</h3>
<div id="users"></div>
</div>

<!-- RECHARGES -->
<div class="card">
<h3>💰 Recharges</h3>
<div id="recharges"></div>
</div>

<!-- RETRAITS -->
<div class="card">
<h3>💸 Retraits</h3>
<div id="retraits"></div>
</div>

<!-- COMMANDES -->
<div class="card">
<h3>📦 Commandes</h3>
<div id="commandes"></div>
</div>

<!-- TRANSFERTS -->
<div class="card">
<h3>🔁 Transferts</h3>
<div id="transferts"></div>
</div>

<!-- MESSAGE -->
<div class="card">
<h3>📩 Envoyer message</h3>

<input id="target" placeholder="Numéro utilisateur">
<textarea id="msg" placeholder="Message"></textarea>
<input id="file" type="text" placeholder="Lien image/fichier (optionnel)">

<button onclick="sendMsg()">Envoyer</button>
</div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
