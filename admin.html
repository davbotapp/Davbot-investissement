<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN PANEL</title>

<style>
:root { 
    --blue:#00d2ff; 
    --dark:#050a14; 
    --green:#4caf50; 
    --red:#f44336;
    --glass:rgba(255,255,255,0.05);
}

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: var(--dark);
    color:white;
}

.overlay{
    background:rgba(5,10,20,0.9);
    min-height:100vh;
}

.header{
    text-align:center;
    padding:20px;
    border-bottom:1px solid var(--blue);
}

.container{
    padding:15px;
    max-width:1200px;
    margin:auto;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:15px;
}

.card{
    background:var(--glass);
    border:1px solid rgba(0,210,255,0.2);
    border-radius:15px;
    padding:15px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:none;
    background:rgba(255,255,255,0.1);
    color:white;
}

button{
    padding:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.ok{ background:var(--green); }
.no{ background:var(--red); }

.mainBtn{
    width:100%;
    background:var(--blue);
    margin-top:10px;
}

.logout{
    background:var(--red);
    width:100%;
    margin-top:10px;
}

.list{
    max-height:250px;
    overflow:auto;
}

/* 📦 Détails */
.details{
    margin-top:8px;
    font-size:13px;
    background:#111;
    padding:8px;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="overlay">

<!-- LOGIN -->
<div id="loginBox" style="display:flex;justify-content:center;align-items:center;height:100vh;">
<div class="card" style="max-width:350px;width:90%;">
<h3>🔐 Admin</h3>
<input id="adminPhone" placeholder="Numéro">
<input id="adminPass" type="password" placeholder="Mot de passe">
<button class="mainBtn" onclick="loginAdmin()">Connexion</button>
<p id="error"></p>
</div>
</div>

<!-- PANEL -->
<div id="adminPanel" style="display:none;">

<div class="header">
<h2>⚡ ADMIN PANEL</h2>
<button class="logout" onclick="logoutAdmin()">Déconnexion</button>
</div>

<div class="container">

<div class="grid">

<!-- USERS -->
<div class="card">
<h3>👤 Utilisateurs</h3>
<div id="users" class="list"></div>
</div>

<!-- COMMANDES -->
<div class="card">
<h3>📦 Commandes (Détails)</h3>
<div id="commandes" class="list"></div>
</div>

<!-- RECHARGES -->
<div class="card">
<h3>💰 Recharges</h3>
<div id="recharges" class="list"></div>
</div>

<!-- RETRAITS -->
<div class="card">
<h3>💸 Retraits</h3>
<div id="retraits" class="list"></div>
</div>

<!-- TRANSFERTS -->
<div class="card">
<h3>🔁 Transferts</h3>
<div id="transferts" class="list"></div>
</div>

<!-- 📩 MESSAGE + UPLOAD -->
<div class="card">
<h3>📩 Envoyer message + fichier</h3>

<input id="target" placeholder="Numéro utilisateur">
<textarea id="msg" placeholder="Message"></textarea>

<!-- 🔥 UPLOAD -->
<input type="file" id="uploadFile">

<button class="mainBtn" onclick="sendMsg()">Envoyer</button>

<div class="card">
<h3>📩 Messages Utilisateurs</h3>
<div id="userMessages"></div>
</div>

</div>

</div>

</div>

</div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
