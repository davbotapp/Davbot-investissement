<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN PANEL PRO</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
--blue:#00d2ff;
--dark:#050a14;
--green:#4caf50;
--red:#f44336;
--glass:rgba(255,255,255,0.05);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
background:var(--dark);
color:white;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
border-bottom:1px solid var(--blue);
background:#020617;
position:sticky;
top:0;
}

/* CONTAINER */
.container{
padding:10px;
max-width:1200px;
margin:auto;
}

/* CARD */
.card{
background:var(--glass);
border:1px solid rgba(0,210,255,0.2);
border-radius:15px;
padding:12px;
margin-bottom:12px;
}

/* LIST */
.list{
max-height:300px;
overflow:auto;
}

/* INPUT */
input, textarea{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
}

button{
padding:8px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.mainBtn{
width:100%;
background:var(--blue);
color:black;
}

.logout{
background:var(--red);
color:white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<div class="card">
<h3><i data-lucide="lock"></i> Connexion Admin</h3>

<input id="adminPhone" placeholder="Numéro">
<input id="adminPass" type="password" placeholder="Mot de passe">

<button class="mainBtn" onclick="loginAdmin()">
<i data-lucide="log-in"></i> Connexion
</button>

<p id="error"></p>
</div>
</div>

<!-- PANEL -->
<div id="adminPanel" style="display:none;">

<!-- HEADER -->
<div class="header">
<h2><i data-lucide="shield"></i> Admin Panel</h2>
<button class="logout" onclick="logoutAdmin()">
<i data-lucide="log-out"></i>
</button>
</div>

<div class="container">

<!-- STATS -->
<div class="card">
<i data-lucide="users"></i> <span id="statUsers">0</span> |
<i data-lucide="wallet"></i> <span id="statMoney">0</span> |
<i data-lucide="package"></i> <span id="statCmd">0</span> |
<i data-lucide="credit-card"></i> <span id="statRech">0</span>
</div>

<!-- USERS -->
<div class="card">
<h3><i data-lucide="users"></i> Utilisateurs</h3>
<div id="users" class="list"></div>
</div>

<!-- COMMANDES -->
<div class="card">
<h3><i data-lucide="shopping-cart"></i> Commandes</h3>
<div id="commandes" class="list"></div>
</div>

<!-- RECHARGES -->
<div class="card">
<h3><i data-lucide="credit-card"></i> Recharges</h3>
<div id="recharges" class="list"></div>
</div>

<!-- MONETISATION -->
<div class="card">
<h3><i data-lucide="dollar-sign"></i> Monétisation</h3>
<div id="monetisations" class="list"></div>
</div>

<!-- MESSAGE -->
<div class="card">
<h3><i data-lucide="send"></i> Envoyer message</h3>

<input id="target" placeholder="Numéro utilisateur">
<textarea id="msg" placeholder="Message"></textarea>
<input type="file" id="uploadFile">

<button class="mainBtn" onclick="sendMsg()">
<i data-lucide="send"></i> Envoyer
</button>
</div>

<!-- LISTE MESSAGES -->
<div class="card">
<h3><i data-lucide="message-circle"></i> Messages utilisateurs</h3>
<div id="userMessages" class="list"></div>
</div>

</div>
</div>

<script>
lucide.createIcons();
</script>

<!-- JS -->
<script type="module">
import "./admin.js";
import "./message.js";
</script>

</body>
</html>
