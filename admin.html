<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN PANEL PRO</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
--blue:#00d2ff;
--dark:#050a14;
--red:#f44336;
--glass:rgba(255,255,255,0.05);
}

body{
background:var(--dark);
color:white;
font-family:Segoe UI;
}

.card{
background:var(--glass);
padding:12px;
border-radius:12px;
margin:10px;
}

.list{
max-height:300px;
overflow:auto;
}

button{
padding:8px;
border:none;
border-radius:8px;
cursor:pointer;
}

.mainBtn{
background:var(--blue);
color:black;
width:100%;
}

.logout{
background:var(--red);
color:white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<div class="card">
<h3>Connexion Admin</h3>

<input id="adminPhone" placeholder="Numéro">
<input id="adminPass" type="password" placeholder="Mot de passe">

<button class="mainBtn" onclick="loginAdmin()">Connexion</button>
<p id="error"></p>

</div>
</div>

<!-- PANEL -->
<div id="adminPanel" style="display:none;">

<div class="card">
<h2>ADMIN PANEL</h2>
<button class="logout" onclick="logoutAdmin()">Déconnexion</button>
</div>

<!-- STATS -->
<div class="card">
👥 <span id="statUsers">0</span> |
💰 <span id="statMoney">0</span> |
📦 <span id="statCmd">0</span> |
💳 <span id="statRech">0</span>
</div>

<!-- USERS -->
<div class="card">
<h3>Utilisateurs</h3>
<div id="users" class="list"></div>
</div>

<!-- COMMANDES -->
<div class="card">
<h3>Commandes</h3>
<div id="commandes" class="list"></div>
</div>

<!-- RECHARGES -->
<div class="card">
<h3>Recharges</h3>
<div id="recharges" class="list"></div>
</div>

<!-- TRANSFERTS -->
<div class="card">
<h3>Transferts</h3>
<div id="transferts" class="list"></div>
</div>

<!-- MONETISATION -->
<div class="card">
<h3>Monétisation</h3>
<div id="monetisations" class="list"></div>
</div>

<!-- 🔥 MESSAGE (IMPORTANT POUR message.js) -->
<div class="card">
<h3>Envoyer message</h3>

<input id="target" placeholder="Numéro utilisateur">
<textarea id="msg" placeholder="Message"></textarea>
<input type="file" id="uploadFile">

<button class="mainBtn" onclick="sendMsg()">Envoyer</button>
</div>

<!-- 🔥 LISTE MESSAGES -->
<div class="card">
<h3>Messages utilisateurs</h3>
<div id="userMessages" class="list"></div>
</div>

</div>

<script>
lucide.createIcons();
</script>

<!-- 🔥 IMPORT MODULES -->
<script type="module">
import "./admin.js";
import "./adminuser.js";
import "./admincmd.js";
import "./message.js"; // 🔥 OBLIGATOIRE
</script>

</body>
</html>
