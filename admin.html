<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; --green:#4caf50; --red:#f44336; }

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:var(--dark);
    color:white;
    padding:20px;
}

h2{text-align:center;color:var(--blue);}

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(0,210,255,0.2);
    border-radius:15px;
    padding:15px;
    margin-top:20px;
}

.item{
    background:#111;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
}

button{
    padding:8px;
    border:none;
    border-radius:8px;
    margin-top:5px;
    cursor:pointer;
}

.ok{background:var(--green);}
.no{background:var(--red);}
</style>
</head>

<body>

<h2>⚙️ ADMIN PANEL</h2>

<!-- USERS -->
<div class="card">
<h3>👤 Comptes</h3>
<div id="users"></div>
</div>

<!-- TRANSFERTS -->
<div class="card">
<h3>🔄 Transferts</h3>
<div id="transferts"></div>
</div>

<!-- RETRAITS -->
<div class="card">
<h3>💸 Retraits</h3>
<div id="retraits"></div>
</div>

<!-- RECHARGES -->
<div class="card">
<h3>💰 Recharges</h3>
<div id="recharges"></div>
</div>

<!-- COMMANDES -->
<div class="card">
<h3>📦 Commandes</h3>
<div id="orders"></div>
</div>

<!-- MESSAGE -->
<div class="card">
<h3>📩 Envoyer message</h3>
<input id="target" placeholder="Téléphone">
<input id="msg" placeholder="Message">
<input id="img" placeholder="Image URL">
<input id="file" placeholder="Fichier URL">
<button onclick="sendMsg()">Envoyer</button>
</div>

<script type="module" src="admin.js"></script>
</body>
  </html>
