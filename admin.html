<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN DAVBOT</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; }

body {
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:var(--dark);
    color:white;
    padding:20px;
}

h2 { text-align:center; margin-top:30px; }

.card {
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:15px;
    margin-bottom:10px;
}

button {
    padding:8px 12px;
    border:none;
    border-radius:10px;
    margin:5px;
    font-weight:bold;
    cursor:pointer;
}

.ok { background:#4caf50; }
.no { background:#f44336; }
.user { background:#2196f3; }
</style>
</head>

<body>

<h1 style="text-align:center;">👑 ADMIN DAVBOT</h1>

<!-- 🔥 RECHARGES -->
<h2>💰 Recharges</h2>
<div id="recharges"></div>

<!-- 🔥 RETRAITS -->
<h2>💸 Retraits</h2>
<div id="retraits"></div>

<!-- 🔥 UTILISATEURS -->
<h2>👥 Utilisateurs</h2>
<div id="users"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔐 CONFIG
const firebaseConfig = {
    apiKey: "AIza...",
    authDomain: "starlink-investit.firebaseapp.com",
    databaseURL: "https://starlink-investit-default-rtdb.firebaseio.com",
    projectId: "starlink-investit"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔐 PROTECTION ADMIN
const admin = "0982697752";
const user = localStorage.getItem("userPhone");

if(user !== admin){
    alert("Accès refusé");
    window.location.href = "index.html";
}

// ======================
// 💰 RECHARGES
// ======================
const rechargeDiv = document.getElementById("recharges");

onValue(ref(db, "demandes_recharges"), (snap)=>{
    rechargeDiv.innerHTML = "";
    const data = snap.val();
    if(!data) return;

    for(let id in data){
        const r = data[id];

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            📱 ${r.telephone}<br>
            💰 ${r.montant} FC<br>
            🧾 ID: ${r.transactionID}<br>

            <button class="ok" onclick="validerRecharge('${id}','${r.telephone}',${r.montant})">
                Valider
            </button>

            <button class="no" onclick="refuserRecharge('${id}')">
                Refuser
            </button>
        `;

        rechargeDiv.appendChild(div);
    }
});

// ✅ VALIDER RECHARGE
window.validerRecharge = async (id,phone,montant)=>{

    // ajouter solde
    const userRef = ref(db, "users/" + phone);

    await update(userRef, {
        balance: (await getSolde(phone)) + montant
    });

    // supprimer demande
    await remove(ref(db, "demandes_recharges/" + id));

    alert("Recharge validée 💰");
};

// ❌ REFUSER
window.refuserRecharge = async (id)=>{
    await remove(ref(db, "demandes_recharges/" + id));
    alert("Recharge refusée");
};

// récupérer solde
async function getSolde(phone){
    const snap = await fetch(`https://starlink-investit-default-rtdb.firebaseio.com/users/${phone}.json`);
    const data = await snap.json();
    return data?.balance || 0;
}

// ======================
// 💸 RETRAITS
// ======================
const retraitDiv = document.getElementById("retraits");

onValue(ref(db, "demandes_retraits"), (snap)=>{
    retraitDiv.innerHTML = "";
    const data = snap.val();
    if(!data) return;

    for(let id in data){
        const r = data[id];

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            📱 ${r.telephone}<br>
            💸 ${r.montant} FC<br>
            📲 ${r.methode} - ${r.numero_reception}<br>

            <button class="ok" onclick="validerRetrait('${id}')">
                Payé
            </button>

            <button class="no" onclick="refuserRetrait('${id}')">
                Refuser
            </button>
        `;

        retraitDiv.appendChild(div);
    }
});

// ✅ VALIDER RETRAIT
window.validerRetrait = async (id)=>{
    await remove(ref(db, "demandes_retraits/" + id));
    alert("Retrait confirmé 💸");
};

// ❌ REFUSER RETRAIT
window.refuserRetrait = async (id)=>{
    await remove(ref(db, "demandes_retraits/" + id));
    alert("Retrait refusé");
};

// ======================
// 👥 UTILISATEURS
// ======================
const usersDiv = document.getElementById("users");

onValue(ref(db, "users"), (snap)=>{
    usersDiv.innerHTML = "";
    const data = snap.val();
    if(!data) return;

    for(let phone in data){
        const u = data[phone];

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            📱 ${phone}<br>
            💰 Solde: ${u.balance || 0} FC<br>
            👥 Code: ${u.inviteCode || "N/A"}
        `;

        usersDiv.appendChild(div);
    }
});

</script>

</body>
</html>
