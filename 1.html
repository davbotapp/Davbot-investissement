<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Slot G3</title>

<style>
:root{--blue:#00d2ff;--dark:#050a14;}
body{background:var(--dark);color:white;text-align:center;font-family:sans-serif;}
.card{background:#111;padding:20px;border-radius:15px;margin:20px;}
button{padding:15px;background:var(--blue);border:none;border-radius:10px;}
</style>
</head>

<body>

<div class="card">
<h2>🎰 Slot G3</h2>
<button onclick="play()">Jouer</button>
<p id="res"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({apiKey:"AIza...",databaseURL:"https://starlink-investit-default-rtdb.firebaseio.com"});
const db = getDatabase(app);

const user = localStorage.getItem("userPhone");

function smartGain(data){
let r = Math.random()*100;
let gain = 0;

if(r<55) gain=0;
else if(r<80) gain=5000;
else if(r<96) gain=15000;
else gain=25000;

// 🔒 limite utilisateur
if((data.todayGain||0)>=25000) gain=0;

// 🧠 réduction si trop riche
if((data.points||0)>200000) gain*=0.3;

// 💀 anti abus
if((data.totalPlayed||0)>50) gain=0;

return Math.floor(gain);
}

window.play = async()=>{

const snap = await get(ref(db,"users/"+user));
const d = snap.val();

// 🔐 jeton
if(!d.tokenG3 || Date.now()>d.tokenG3.expire){
alert("Jeton G3 requis");
return;
}

// ⛔ 1 fois / jour
const today = new Date().toDateString();
if(d.slotDate===today){
alert("Déjà joué aujourd'hui");
return;
}

let gain = smartGain(d);

await update(ref(db,"users/"+user),{
points:(d.points||0)+gain,
todayGain:(d.todayGain||0)+gain,
totalPlayed:(d.totalPlayed||0)+1,
slotDate:today
});

document.getElementById("res").innerText =
gain?("🎉 +"+gain+" pts"):"❌ Perdu";
};
</script>

</body>
</html>
