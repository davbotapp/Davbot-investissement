<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tâche G3</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; }

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:var(--dark);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:#111;
    padding:25px;
    border-radius:15px;
    width:90%;
    max-width:400px;
    text-align:center;
}

button{
    width:100%;
    padding:15px;
    background:var(--blue);
    border:none;
    border-radius:10px;
    margin-top:15px;
    font-weight:bold;
}

.result{
    margin-top:15px;
    font-size:18px;
}

</style>
</head>

<body>

<div class="card">

<h2>🎯 Tâche G3</h2>

<p>1 essai par jour</p>

<button id="playBtn">Jouer</button>

<div class="result" id="result"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getDatabase, ref, get, update
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// CONFIG
const firebaseConfig = {
apiKey:"AIza...",
authDomain:"starlink-investit.firebaseapp.com",
databaseURL:"https://starlink-investit-default-rtdb.firebaseio.com",
projectId:"starlink-investit"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// USER
const user = localStorage.getItem("userPhone");
if(!user) location.href = "index.html";

const btn = document.getElementById("playBtn");
const resultEl = document.getElementById("result");

// DATE DU JOUR
const today = new Date().toISOString().slice(0,10);

// CLICK
btn.onclick = async ()=>{

    btn.disabled = true;

    const userRef = ref(db,"users/"+user);
    const snap = await get(userRef);

    if(!snap.exists()) return;

    const data = snap.val();

    // =========================
    // 🔒 CHECK TOKEN G3
    // =========================
    const token = data.tokenG3;

    if(!token){
        resultEl.innerText = "❌ Aucun jeton G3";
        return;
    }

    const now = Date.now();

    if(now > token.expire){
        resultEl.innerText = "❌ Jeton expiré";
        return;
    }

    // =========================
    // 🔒 CHECK JOUR
    // =========================
    if(token.lastPlay === today){
        resultEl.innerText = "❌ Déjà joué aujourd'hui";
        return;
    }

    // =========================
    // 🎯 PROBABILITÉ
    // =========================
    const rand = Math.random();

    let gainPoints = 0;
    let message = "";

    if(rand < 0.55){
        message = "❌ Perdu";
    }
    else if(rand < 0.80){
        gainPoints = 5000;
        message = "🟢 Petit gain +5000 pts";
    }
    else if(rand < 0.96){
        gainPoints = 15000;
        message = "🔵 Gain moyen +15000 pts";
    }
    else{
        gainPoints = 25000; // jackpot journalier max
        message = "🟡 JACKPOT +25000 pts";
    }

    // =========================
    // 💰 AJOUT POINTS
    // =========================
    const points = data.points || 0;

    await update(userRef,{
        points: points + gainPoints,
        tokenG3: {
            ...token,
            lastPlay: today
        }
    });

    resultEl.innerText = message;

};

</script>

</body>
</html>
