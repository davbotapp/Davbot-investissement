<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Davbot - Accès</title>

<style>
:root { --blue: #00d2ff; --dark: #050a14; }

body { 
    margin: 0; font-family: 'Segoe UI', sans-serif; 
    background: var(--dark) url('IMG_0870.jpeg') no-repeat center center fixed;
    background-size: cover; color: white; 
    display: flex; justify-content: center; align-items: center; 
    min-height: 100vh; text-align: center; 
}

.overlay-login { 
    position: absolute; width: 100%; height: 100%; 
    background: rgba(0, 0, 0, 0.6); z-index: 1; 
}

.card { 
    background: rgba(0, 0, 0, 0.85); padding: 30px; border-radius: 25px; 
    border: 1px solid var(--blue); width: 90%; max-width: 380px; 
    backdrop-filter: blur(15px); z-index: 2; position: relative;
    box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
}

input { 
    width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; 
    border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); 
    color: white; font-size: 15px;
}

input[type="file"]{
    padding: 8px;
}

button { 
    width: 100%; padding: 15px; background: var(--blue); color: black; 
    border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
}

.switch { 
    margin-top: 15px; cursor: pointer; color: var(--blue); font-size: 13px;
}

.status { 
    margin-top: 15px; font-size: 13px; color: #ffeb3b; min-height: 20px; 
}

.preview{
    width:60px;
    height:60px;
    border-radius:50%;
    object-fit:cover;
    margin:10px auto;
    display:none;
}
</style>
</head>

<body>

<div class="overlay-login"></div>

<div class="card">

<h2 style="color:var(--blue)">DAVBOT SERVICE</h2>

<!-- 👤 NOM -->
<input type="text" id="name" placeholder="Nom complet" style="display:none;">

<!-- 📸 PHOTO -->
<input type="file" id="photo" accept="image/*" style="display:none;">
<img id="preview" class="preview">

<!-- 📱 TEL -->
<input type="tel" id="phone" placeholder="Téléphone">

<!-- 🔐 PASS -->
<input type="password" id="pass" placeholder="Mot de passe">

<!-- 🎁 PARRAIN -->
<input type="text" id="invite" placeholder="Code parrain" style="display:none;">

<!-- BTN -->
<button id="btn">SE CONNECTER</button>

<!-- SWITCH -->
<div class="switch" id="switch">Créer un compte</div>

<div id="statusMsg" class="status"></div>

</div>

<script type="module" src="index.js"></script>

<script>
// 👁️ PREVIEW IMAGE
document.getElementById("photo").addEventListener("change", function(){
    const file = this.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(e){
        const img = document.getElementById("preview");
        img.src = e.target.result;
        img.style.display = "block";
    };
    reader.readAsDataURL(file);
});
</script>

</body>
</html>
