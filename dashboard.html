<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; --green:#4caf50; --red:#f44336; }

body{
    margin:0;
    font-family:sans-serif;
    background:var(--dark);
    color:white;
}

.container{padding:20px;}

h2{color:var(--blue);}

.card{
    background:#111;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
}

.flex{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.btn{
    width:100%;
    padding:12px;
    background:var(--green);
    border:none;
    border-radius:10px;
    margin-top:10px;
    font-weight:bold;
}

.order{
    background:#1a1a1a;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.pending{border-left:5px solid orange;}
.valid{border-left:5px solid var(--green);}
.cancel{border-left:5px solid var(--red);}

.navbar{
    position:fixed;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-around;
    padding:10px;
}
</style>

</head>

<body>

<div class="container">

<h2 id="welcome">Bienvenue...</h2>

<!-- SOLDE -->
<div class="card flex">
    <div>
        💰 Balance<br>
        <b id="balance">0</b> FC
    </div>
</div>

<!-- POINTS -->
<div class="card">
    🎯 Points : <b id="points">0</b><br>
    💱 = <b id="pointsFC">0</b> FC
    <button class="btn" onclick="convertPoints()">Convertir points</button>
</div>

<!-- COMMANDES -->
<h3>📦 Mes commandes</h3>
<div id="orders"></div>

</div>

<nav class="navbar">
<a href="dashboard.html">Dash</a>
<a href="service.html">Shop</a>
<a href="profil.html">Profil</a>
</nav>

<script type="module" src="dash.js"></script>

</body>
</html>
