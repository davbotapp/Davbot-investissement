<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; --green:#4caf50; --red:#f44336; }

body{
    margin:0;
    font-family:sans-serif;
    background:var(--dark);
    color:white;
    padding-bottom:100px;
}

.container{padding:20px;}

h2{color:var(--blue);}

.card{
    background:#111;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}

.counter{
    font-size:28px;
    text-align:center;
}

.btn{
    width:100%;
    padding:15px;
    background:var(--green);
    border:none;
    border-radius:10px;
    margin-top:10px;
}

.order{
    padding:10px;
    border-radius:10px;
    margin-top:10px;
    background:#1a1a1a;
}

.pending{border-left:5px solid orange;}
.valid{border-left:5px solid var(--green);}
.cancel{border-left:5px solid var(--red);}

.navbar{
    position:fixed;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-around;
    padding:10px;
}
</style>

</head>

<body>

<div class="container">

<h2 id="welcome">Bienvenue...</h2>

<div class="card">
    💰 Solde principal : <b id="balPrincipal">0</b> FC
</div>

<div class="card">
    💸 Solde gains : <b id="balGains">0</b> FC
</div>

<div class="card">
    <div class="counter" id="liveCounter">0</div>
    <button class="btn" id="btnCollect">Récupérer gains</button>
</div>

<h3>📦 Mes commandes</h3>
<div id="orders"></div>

</div>

<nav class="navbar">
<a href="dashboard.html">Dash</a>
<a href="service.html">Shop</a>
<a href="profil.html">Profil</a>
</nav>

<script type="module" src="dash.js"></script>

</body>
</html>
