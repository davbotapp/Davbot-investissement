<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Davbot - Dashboard</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; --green:#4caf50; --red:#f44336; }

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: var(--dark) url('IMG_0870.jpeg') no-repeat center center fixed;
    background-size: cover;
    color:white;
}

.overlay{
    background: rgba(0,0,0,0.7);
    min-height:100vh;
    padding:20px;
}

.card{
    background: rgba(0,0,0,0.85);
    border:1px solid var(--blue);
    border-radius:20px;
    padding:20px;
    margin-top:15px;
    backdrop-filter: blur(15px);
    box-shadow:0 0 15px rgba(0,210,255,0.2);
}

h2{
    text-align:center;
    color:var(--blue);
}

.flex{
    display:flex;
    justify-content:space-between;
}

.btn{
    width:100%;
    padding:14px;
    background:var(--green);
    border:none;
    border-radius:10px;
    margin-top:10px;
    font-weight:bold;
    cursor:pointer;
}

.order{
    background:rgba(255,255,255,0.05);
    padding:12px;
    border-radius:12px;
    margin-top:10px;
    font-size:14px;
}

.pending{border-left:5px solid orange;}
.valid{border-left:5px solid var(--green);}
.cancel{border-left:5px solid var(--red);}

/* 🔥 EVOLUTION BAR */
.progress{
    height:10px;
    background:#222;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
}
.progress div{
    height:100%;
    background:var(--blue);
    width:0%;
}

.navbar{
    position:fixed;
    bottom:0;
    width:100%;
    background: rgba(0,0,0,0.9);
    display:flex;
    justify-content:space-around;
    padding:12px;
    border-top:1px solid var(--blue);
}
.navbar a{
    color:white;
    text-decoration:none;
    font-size:12px;
    text-align:center;
}
</style>
</head>

<body>

<div class="overlay">

<h2 id="welcome">Bienvenue...</h2>

<!-- 💰 SOLDE -->
<div class="card flex">
    <div>
        💰 Solde FC<br>
        <b id="balance">0</b>
    </div>
</div>

<!-- 🎯 POINTS -->
<div class="card">
    🎯 Points fidélité : <b id="points">0</b><br>
    💱 = <b id="pointsFC">0</b> FC

    <button class="btn" id="convertBtn">Convertir en FC</button>
</div>

<!-- 📈 ÉVOLUTION -->
<div class="card">
    📈 Évolution du compte

    <div style="margin-top:10px;">
        Commandes validées : <b id="validCount">0</b><br>
        Commandes en attente : <b id="pendingCount">0</b><br>
    </div>

    <div class="progress">
        <div id="progressBar"></div>
    </div>
</div>

<!-- 📦 COMMANDES -->
<h3 style="margin-top:20px;">📦 Mes commandes</h3>

<div class="card" style="background:#111;border:1px solid orange;">
⚠️ Si votre commande n’a pas été effectuée, remboursement de votre argent.
</div>

<div id="orders"></div>

</div>

<nav class="navbar">
<a href="dashboard.html">📊<br>Dash</a>
<a href="service.html">📡<br>Shop</a>
<a href="profil.html">👤<br>Profil</a>
</nav>

<script type="module" src="dash.js"></script>

</body>
</html>
