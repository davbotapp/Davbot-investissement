<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Davbot - Dashboard</title>

<style>
:root { --blue:#00d2ff; --dark:#050a14; --green:#4caf50; --red:#f44336; }

body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: var(--dark) url('IMG_0870.jpeg') no-repeat center center fixed;
    background-size: cover;
    color:white;
}

.overlay{
    background: rgba(0,0,0,0.7);
    min-height:100vh;
    padding:20px;
}

.card{
    background: rgba(0,0,0,0.85);
    border:1px solid var(--blue);
    border-radius:20px;
    padding:20px;
    margin-top:15px;
    backdrop-filter: blur(15px);
}

.flex{
    display:flex;
    justify-content:space-between;
}

.btn{
    width:100%;
    padding:14px;
    background:var(--green);
    border:none;
    border-radius:10px;
    margin-top:10px;
    font-weight:bold;
    cursor:pointer;
}

.order{
    background:rgba(255,255,255,0.05);
    padding:12px;
    border-radius:12px;
    margin-top:10px;
    font-size:14px;
}

.pending{border-left:5px solid orange;}
.valid{border-left:5px solid var(--green);}
.cancel{border-left:5px solid var(--red);}

.navbar{
    position:fixed;
    bottom:0;
    width:100%;
    background: rgba(0,0,0,0.9);
    display:flex;
    justify-content:space-around;
    padding:12px;
}

.navbar a{
    color:white;
    text-decoration:none;
    font-size:12px;
    text-align:center;
}
</style>
</head>

<body>

<div class="overlay">

<h2>Bienvenue 👋</h2>

<!-- SOLDE -->
<div class="card flex">
    <div>
        💰 Solde FC<br>
        <b id="balance">0</b>
    </div>
</div>

<!-- POINTS -->
<div class="card">
    🎯 Points : <b id="points">0</b><br>
    💱 = <b id="pointsFC">0</b> FC
    <button class="btn" id="convertBtn">Convertir en FC</button>
</div>
    <!-- 📊 TABLEAU DE BORD -->
<div class="card">
    <h3>📊 Tableau de bord</h3>

    <div class="flex">
        <div>
            📈 Total gagné<br>
            <b id="totalGain">0</b> FC
        </div>

        <div>
            📉 Total dépensé<br>
            <b id="totalDepense">0</b> FC
        </div>
    </div>

    <hr style="opacity:0.2;margin:10px 0;">

    💼 Évolution du solde<br>
    <b id="evolution">0</b> FC
</div>

<!-- MESSAGE -->
<p style="text-align:center;color:#ff9800;margin-top:10px;">
⚠️ Si la commande n'est pas effectuée, remboursement automatique de votre argent
</p>

<!-- COMMANDES -->
<h3>📦 Mes commandes</h3>
<div id="orders"></div>

</div>

<nav class="navbar">
<a href="dashboard.html">📊<br>Dash</a>
<a href="service.html">📡<br>Shop</a>
<a href="profil.html">👤<br>Profil</a>
</nav>

<script type="module" src="dash.js"></script>

</body>
</html>
